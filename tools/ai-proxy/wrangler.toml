name = "watts-ai-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
# GEMINI_API_KEY is set via: wrangler secret put GEMINI_API_KEY
# CONTRACT_HMAC_SECRET is set via: wrangler secret put CONTRACT_HMAC_SECRET

# KV namespace for secure contract storage (one-time e-sign links)
# Create with: wrangler kv namespace create CONTRACTS
# Then paste the id below
[[kv_namespaces]]
binding = "CONTRACTS"
id = "5eb1067365f24433832c7c2b37253c12"

# Daily cron: follow-up reminders at 9 AM CST (15:00 UTC)
[triggers]
crons = ["0 15 * * *"]

# Lead automation secrets (set via wrangler secret put):
# OWNER_PIN             — PIN for lead dashboard access (use your BidGen PIN)
