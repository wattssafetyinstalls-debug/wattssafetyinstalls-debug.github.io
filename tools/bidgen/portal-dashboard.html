<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Dashboard — BidGen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
:root {
    --bg: #060a14;
    --bg2: #0b1121;
    --card: #0f172a;
    --card-hover: #131c33;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* Login */
.login-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
}
.login-card {
    background: var(--card); border: 1px solid var(--border2);
    border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.login-card .icon { font-size: 48px; margin-bottom: 16px; }
.login-card h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.3px; }
.login-card .sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
.login-card input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border2); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 16px; font-family: inherit;
    text-align: center; letter-spacing: 6px; font-weight: 700;
    outline: none; transition: border-color 0.2s;
}
.login-card input:focus { border-color: var(--accent); }
.login-card input::placeholder { letter-spacing: 1px; font-weight: 400; color: var(--text3); }
.login-card button {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    color: white; font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 12px; font-family: inherit; transition: opacity 0.2s;
}
.login-card button:hover { opacity: 0.9; }
.login-error { color: var(--red); font-size: 12px; margin-top: 10px; min-height: 18px; }

/* Header */
.dash-header {
    background: var(--bg2); border-bottom: 1px solid rgba(59,130,246,0.15);
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
}
.dash-header-left { display: flex; align-items: center; gap: 12px; }
.dash-logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.dash-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.dash-subtitle { font-size: 11px; color: var(--text3); }
.dash-actions { display: flex; gap: 8px; align-items: center; }
.dash-actions a, .dash-actions button {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text2); padding: 8px 14px; border-radius: 10px;
    font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none;
    font-family: inherit; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.dash-actions a:hover, .dash-actions button:hover {
    background: rgba(255,255,255,0.08); border-color: var(--border2); color: var(--text);
}

/* Stats row */
.stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding: 20px 24px;
}
.stat-card {
    border-radius: 14px; padding: 16px; text-align: center;
    border: 1px solid; transition: transform 0.15s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card .num { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
.stat-card .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
.stat-signed { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); }
.stat-signed .num, .stat-signed .label { color: var(--green); }
.stat-viewed { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); }
.stat-viewed .num, .stat-viewed .label { color: var(--amber); }
.stat-pending { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.2); }
.stat-pending .num, .stat-pending .label { color: var(--accent); }
.stat-declined { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
.stat-declined .num, .stat-declined .label { color: var(--red); }

/* Filters */
.filters-row {
    padding: 0 24px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    color: var(--text3); padding: 7px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
}
.filter-btn:hover { background: rgba(255,255,255,0.08); color: var(--text2); }
.filter-btn.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: var(--accent); }
.filter-search {
    flex: 1; min-width: 160px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 12px; font-family: inherit; outline: none;
}
.filter-search:focus { border-color: rgba(59,130,246,0.3); }

/* Portal cards */
.portal-list { padding: 0 24px 24px; }
.portal-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px; margin-bottom: 10px;
    transition: border-color 0.15s, background 0.15s;
}
.portal-card:hover { border-color: rgba(59,130,246,0.25); background: var(--card-hover); }
.pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.pc-client { font-size: 15px; font-weight: 700; color: var(--text); }
.pc-amount { font-size: 14px; font-weight: 800; color: var(--accent); margin-left: 10px; }
.pc-badge {
    padding: 3px 12px; border-radius: 20px; font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
}
.badge-signed { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-viewed { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-pending { background: rgba(59,130,246,0.15); color: var(--accent); }
.badge-declined { background: rgba(239,68,68,0.15); color: var(--red); }
.pc-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 11px; color: var(--text3); }
.pc-signed-info {
    background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.1);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
    font-size: 11px; color: #86efac;
}
.pc-declined-info {
    background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.1);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 12px;
    font-size: 11px; color: #fca5a5;
}
.pc-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.pc-btn {
    background: #1e293b; color: var(--text2); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 8px; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.pc-btn:hover { background: #253449; color: var(--text); border-color: var(--border2); }

/* Empty state */
.empty-state {
    text-align: center; padding: 80px 20px; color: var(--text3);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* Loading */
.loading { text-align: center; padding: 60px 0; color: var(--text3); font-size: 13px; }
.spinner {
    width: 32px; height: 32px; border: 3px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: var(--text); border: 1px solid var(--border2);
    padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 10000;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 640px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 16px; }
    .stat-card .num { font-size: 22px; }
    .portal-list { padding: 0 16px 16px; }
    .portal-card { padding: 14px; }
    .dash-header { padding: 12px 16px; }
    .filters-row { padding: 0 16px 12px; }
    .dash-title { font-size: 15px; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-wrap">
    <div class="login-card">
        <div class="icon">🌐</div>
        <h1>Portal Dashboard</h1>
        <div class="sub">Enter your BidGen PIN to view all published estimates</div>
        <input type="password" id="pinInput" placeholder="PIN" maxlength="10" inputmode="numeric" autocomplete="off">
        <button onclick="attemptLogin()">Open Dashboard</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- Dashboard (hidden until login) -->
<div id="dashScreen" style="display:none">
    <div class="dash-header">
        <div class="dash-header-left">
            <div class="dash-logo">🌐</div>
            <div>
                <div class="dash-title">Portal Dashboard</div>
                <div class="dash-subtitle">All published estimates — real-time status</div>
            </div>
        </div>
        <div class="dash-actions">
            <button onclick="loadDashboard()" title="Refresh">🔄 Refresh</button>
            <a href="index.html">← BidGen</a>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card stat-signed"><div class="num" id="statSigned">—</div><div class="label">Signed</div></div>
        <div class="stat-card stat-viewed"><div class="num" id="statViewed">—</div><div class="label">Viewed</div></div>
        <div class="stat-card stat-pending"><div class="num" id="statPending">—</div><div class="label">Pending</div></div>
        <div class="stat-card stat-declined"><div class="num" id="statDeclined">—</div><div class="label">Declined</div></div>
    </div>

    <div class="filters-row">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="signed" onclick="setFilter('signed',this)">Signed</button>
        <button class="filter-btn" data-filter="viewed" onclick="setFilter('viewed',this)">Viewed</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-btn" data-filter="declined" onclick="setFilter('declined',this)">Declined</button>
        <input type="text" class="filter-search" id="searchInput" placeholder="Search client or invoice #..." oninput="applyFilters()">
    </div>

    <div class="portal-list" id="portalList">
        <div class="loading"><div class="spinner"></div>Loading portal data...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Firebase config (same as BidGen)
var firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY_HERE",
    authDomain: "wsi---bid-generator.firebaseapp.com",
    databaseURL: "https://wsi---bid-generator-default-rtdb.firebaseio.com",
    projectId: "wsi---bid-generator",
    storageBucket: "wsi---bid-generator.firebasestorage.app",
    messagingSenderId: "613129301141",
    appId: "1:613129301141:web:92405028eca5aae354bf9c"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var hashedPIN = null;
var allItems = [];
var currentFilter = 'all';

// PIN hashing — same as BidGen
function hashPIN(pin) {
    var h = 0;
    for (var i = 0; i < pin.length; i++) {
        h = ((h << 5) - h) + pin.charCodeAt(i);
        h |= 0;
    }
    return 'u' + Math.abs(h).toString(36);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function timeAgo(dateStr) {
    if (!dateStr) return '';
    var diff = Date.now() - new Date(dateStr).getTime();
    var s = Math.floor(diff / 1000);
    if (s < 60) return s + 's ago';
    var m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);
    if (d < 30) return d + 'd ago';
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function copyToClipboard(text) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() { showToast('Link copied!'); });
    } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Link copied!');
    }
}

function buildPortalUrl(invoiceId) {
    return window.location.origin + '/tools/bidgen/portal.html?id=' + encodeURIComponent(invoiceId) + '&pin=' + encodeURIComponent(hashedPIN);
}

// Login
document.getElementById('pinInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') attemptLogin();
});

// Auto-login if PIN in sessionStorage
(function() {
    var saved = sessionStorage.getItem('bidgen_pin');
    if (saved) {
        hashedPIN = hashPIN(saved);
        showDashboard();
    }
})();

function attemptLogin() {
    var pin = document.getElementById('pinInput').value.trim();
    if (pin.length < 4) {
        document.getElementById('loginError').textContent = 'PIN must be at least 4 digits.';
        return;
    }
    hashedPIN = hashPIN(pin);

    // Validate by checking if user data exists
    db.ref('invoices/' + hashedPIN).once('value').then(function(snap) {
        if (snap.exists()) {
            sessionStorage.setItem('bidgen_pin', pin);
            document.getElementById('loginError').textContent = '';
            showDashboard();
        } else {
            document.getElementById('loginError').textContent = 'No data found for this PIN.';
        }
    }).catch(function(err) {
        document.getElementById('loginError').textContent = 'Connection error. Try again.';
    });
}

function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashScreen').style.display = 'block';
    loadDashboard();
}

function loadDashboard() {
    var list = document.getElementById('portalList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading portal data...</div>';

    db.ref('portal/' + hashedPIN).once('value').then(function(snap) {
        var allData = snap.val() || {};
        allItems = [];
        var stats = { signed: 0, viewed: 0, pending: 0, declined: 0 };

        Object.keys(allData).forEach(function(id) {
            var d = allData[id];
            if (!d || !d.invoice) return;
            var status = 'pending';
            if (d.signedAt) { status = 'signed'; stats.signed++; }
            else if (d.declinedAt) { status = 'declined'; stats.declined++; }
            else if (d.viewCount > 0) { status = 'viewed'; stats.viewed++; }
            else { stats.pending++; }
            allItems.push({
                id: id,
                data: d,
                invoice: d.invoice,
                status: status,
                lastActivity: d.signedAt || d.declinedAt || d.lastViewedAt || d.publishedAt || ''
            });
        });

        // Sort newest first
        allItems.sort(function(a, b) { return (b.lastActivity || '').localeCompare(a.lastActivity || ''); });

        // Stats
        document.getElementById('statSigned').textContent = stats.signed;
        document.getElementById('statViewed').textContent = stats.viewed;
        document.getElementById('statPending').textContent = stats.pending;
        document.getElementById('statDeclined').textContent = stats.declined;

        applyFilters();
    }).catch(function(err) {
        list.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Error loading data</h3><p>' + esc(err.message) + '</p></div>';
    });
}

function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    applyFilters();
}

function applyFilters() {
    var search = (document.getElementById('searchInput').value || '').toLowerCase();
    var filtered = allItems.filter(function(item) {
        if (currentFilter !== 'all' && item.status !== currentFilter) return false;
        if (search) {
            var haystack = (item.id + ' ' + (item.invoice.clientName || '')).toLowerCase();
            if (haystack.indexOf(search) === -1) return false;
        }
        return true;
    });

    var list = document.getElementById('portalList');
    if (filtered.length === 0) {
        if (allItems.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">🌐</div><h3>No portals published yet</h3><p>Go to BidGen, generate an estimate, and click the Portal button to publish.</p></div>';
        } else {
            list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No matches</h3><p>Try a different filter or search term.</p></div>';
        }
        return;
    }

    var h = '';
    filtered.forEach(function(item) {
        var d = item.data;
        var inv = item.invoice;
        var vc = d.viewCount || 0;
        var url = buildPortalUrl(item.id);

        // Badge
        var badgeClass = 'badge-' + item.status;
        var badgeText = '';
        if (item.status === 'signed') badgeText = '✓ SIGNED';
        else if (item.status === 'declined') badgeText = '✕ DECLINED';
        else if (item.status === 'viewed') badgeText = '👁 VIEWED';
        else badgeText = '● SENT';

        h += '<div class="portal-card" data-status="' + item.status + '">';

        // Top: client + amount + badge
        h += '<div class="pc-top">';
        h += '<div><span class="pc-client">' + esc(inv.clientName || 'Client') + '</span>';
        h += '<span class="pc-amount">$' + (parseFloat(inv.amount) || 0).toFixed(2) + '</span></div>';
        h += '<span class="pc-badge ' + badgeClass + '">' + badgeText + '</span>';
        h += '</div>';

        // Meta row
        h += '<div class="pc-meta">';
        h += '<span>#' + esc(item.id) + '</span>';
        if (d.publishedAt) h += '<span>Published ' + timeAgo(d.publishedAt) + '</span>';
        h += '<span>' + vc + ' view' + (vc !== 1 ? 's' : '') + '</span>';
        if (d.lastViewedAt) h += '<span>Last viewed: ' + timeAgo(d.lastViewedAt) + '</span>';
        if (d.totalTimeSpent) {
            var ts = d.totalTimeSpent;
            var tStr = ts < 60 ? ts + 's' : Math.floor(ts/60) + 'm ' + (ts%60) + 's';
            h += '<span>Time on page: ' + tStr + '</span>';
        }
        if (d.unreadClient > 0) h += '<span style="color:var(--accent);font-weight:700">💬 ' + d.unreadClient + ' unread</span>';
        h += '</div>';

        // Signed info
        if (d.signedAt) {
            h += '<div class="pc-signed-info">';
            h += 'Signed by <strong>' + esc(d.signerName || 'Client') + '</strong> on ';
            h += new Date(d.signedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
            if (d.receiptId) h += ' &nbsp;·&nbsp; Receipt #' + esc(d.receiptId);
            h += '</div>';
        }

        // Declined info
        if (d.declinedAt) {
            h += '<div class="pc-declined-info">';
            h += 'Declined ' + timeAgo(d.declinedAt);
            if (d.declineReason) h += ' — "' + esc(d.declineReason) + '"';
            h += '</div>';
        }

        // Actions
        h += '<div class="pc-actions">';
        h += '<button class="pc-btn" onclick="copyToClipboard(\'' + url.replace(/'/g, "\\'") + '\')">📋 Copy Link</button>';
        h += '<a class="pc-btn" href="' + url + '" target="_blank">🔗 Open Portal</a>';
        if (d.signedAt && d.invoiceSnapshot) {
            h += '<button class="pc-btn" onclick="viewReceipt(\'' + esc(item.id) + '\')" style="color:var(--green)">🧾 View Receipt</button>';
        }
        h += '</div>';

        h += '</div>';
    });

    list.innerHTML = h;
}

function viewReceipt(invoiceId) {
    var url = buildPortalUrl(invoiceId);
    window.open(url, '_blank');
}
</script>
</body>
</html>
