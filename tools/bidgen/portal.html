<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Your Estimate — Review & Sign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
:root {
    --bg: #fafbfc;
    --card: #ffffff;
    --card2: #f4f6f8;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.12);
    --text: #1a202c;
    --text2: #4a5568;
    --text3: #718096;
    --accent: #3b82f6;
    --green: #059669;
    --green-light: #ecfdf5;
    --red: #dc2626;
    --amber: #d97706;
    --radius: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
}

/* Loading state */
.portal-loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 16px;
}
.portal-loading .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error state */
.portal-error {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 16px;
    text-align: center; padding: 24px;
}
.portal-error .err-icon { font-size: 48px; margin-bottom: 8px; }
.portal-error h2 { font-size: 20px; font-weight: 700; color: var(--text); }
.portal-error p { color: var(--text3); font-size: 15px; max-width: 380px; line-height: 1.6; }

/* Header banner */
.portal-banner {
    padding: 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.1);
}
.portal-banner-inner {
    max-width: 680px; margin: 0 auto; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
}
.portal-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.portal-brand-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.portal-brand h1 {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.portal-brand p {
    font-size: 11px; opacity: 0.7; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.portal-status-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px; flex-shrink: 0;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}

/* Welcome hero */
.portal-hero {
    max-width: 680px; margin: 0 auto; padding: 32px 20px 0;
    text-align: center;
}
.portal-hero h2 {
    font-size: clamp(22px, 5vw, 28px); font-weight: 800;
    letter-spacing: -0.5px; color: var(--text); margin-bottom: 8px;
    line-height: 1.2;
}
.portal-hero p {
    font-size: 15px; color: var(--text3); max-width: 420px;
    margin: 0 auto; line-height: 1.6;
}

/* Main content */
.portal-body { max-width: 680px; margin: 0 auto; padding: 20px 16px 140px; }

/* Section card */
.p-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
}
.p-card:hover { box-shadow: var(--shadow); }
.p-card-title {
    font-size: 13px; font-weight: 700;
    color: var(--text); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
}
.p-card-title span { font-size: 16px; }

/* Client info grid */
.p-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.p-info-box {
    background: var(--card2); border-radius: 12px; padding: 14px;
    border: 1px solid transparent; transition: border-color 0.15s;
}
.p-info-label {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 4px; font-weight: 600;
}
.p-info-value {
    font-size: 14px; font-weight: 600; color: var(--text);
    word-break: break-word;
}

/* Totals — responsive grid */
.p-totals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.p-total-box {
    background: var(--card2); border-radius: 14px; padding: 16px 12px;
    text-align: center; border: 1px solid transparent;
}
.p-total-label {
    font-size: 10px; color: var(--text3); text-transform: uppercase;
    margin-bottom: 6px; letter-spacing: 0.5px; font-weight: 600;
}
.p-total-value {
    font-size: clamp(18px, 4vw, 24px); font-weight: 800;
    letter-spacing: -0.5px; word-break: break-all;
}
.p-total-grand {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
    border: 2px solid rgba(5,150,105,0.2);
}
.p-total-grand .p-total-value { color: var(--green); }
.p-total-grand .p-total-label { color: var(--green); }

/* Scope of work */
.p-scope-list { list-style: none; padding: 0; }
.p-scope-list li {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text); line-height: 1.6;
}
.p-scope-list li:last-child { border-bottom: none; }
.p-scope-check {
    width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
}

/* Line items — mobile-friendly cards on small screens */
.p-line-items { display: flex; flex-direction: column; gap: 8px; }
.p-line-item {
    background: var(--card2); border-radius: 12px; padding: 14px 16px;
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 12px;
    border: 1px solid transparent; transition: border-color 0.15s;
}
.p-line-item:hover { border-color: var(--border2); }
.p-line-num {
    font-size: 11px; font-weight: 800; min-width: 22px; height: 22px;
    border-radius: 6px; display: inline-flex; align-items: center;
    justify-content: center; flex-shrink: 0;
}
.p-line-desc {
    flex: 1; min-width: 120px; font-size: 14px; font-weight: 600;
    color: var(--text);
}
.p-line-detail {
    font-size: 12px; color: var(--text3); width: 100%;
    padding-left: 34px; margin-top: 2px;
}
.p-line-amount {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-left: auto; white-space: nowrap;
}
.p-line-subtotal {
    background: transparent; border-top: 2px solid var(--border2);
    border-radius: 0; padding: 14px 16px 4px;
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 700; font-size: 14px;
}
.p-line-subtotal span:last-child { font-size: 16px; }

/* Notes */
.p-note {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
    font-size: 14px; color: var(--text2); line-height: 1.6;
    border-bottom: 1px solid var(--border);
}
.p-note:last-child { border-bottom: none; }
.p-note-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 8px;
}

/* Client Q&A */
.p-qa-thread {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 16px; max-height: 300px; overflow-y: auto;
    scroll-behavior: smooth;
}
.p-qa-msg {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.5;
}
.p-qa-msg.client {
    align-self: flex-end; background: var(--accent); color: white;
    border-bottom-right-radius: 4px;
}
.p-qa-msg.contractor {
    align-self: flex-start; background: var(--card2);
    border: 1px solid var(--border); color: var(--text);
    border-bottom-left-radius: 4px;
}
.p-qa-meta { font-size: 10px; margin-top: 4px; opacity: 0.6; }
.p-qa-input-row { display: flex; gap: 8px; align-items: flex-end; }
.p-qa-input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px; color: var(--text);
    font-size: 14px; font-family: inherit; resize: none; outline: none;
    min-height: 44px; max-height: 100px;
    transition: border-color 0.15s;
}
.p-qa-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.p-qa-send {
    background: var(--accent); color: white; border: none;
    width: 44px; height: 44px; border-radius: 14px; font-weight: 700;
    font-size: 18px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.p-qa-send:hover { background: #2563eb; transform: scale(1.05); }
.p-qa-send:active { transform: scale(0.95); }

/* Signature */
.p-sig-canvas-wrap {
    position: relative; background: #fff; border: 2px dashed var(--border2);
    border-radius: 14px; overflow: hidden; touch-action: none;
}
.p-sig-canvas-wrap.active { border-color: var(--accent); border-style: solid; }
.p-sig-canvas {
    width: 100%; height: 160px; display: block;
    cursor: crosshair; touch-action: none;
}
.p-sig-placeholder {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none; text-align: center; color: var(--text3);
    font-size: 13px; transition: opacity 0.2s;
}
.p-sig-placeholder .icon { font-size: 28px; margin-bottom: 4px; display: block; }
.p-sig-canvas-wrap.active .p-sig-placeholder,
.p-sig-canvas-wrap.has-data .p-sig-placeholder { opacity: 0; }
.p-sig-line {
    position: absolute; bottom: 40px; left: 20px; right: 20px;
    height: 1px; background: rgba(0,0,0,0.1); pointer-events: none;
}
.p-sig-typed {
    width: 100%; background: #fff; border: 2px solid var(--border2);
    border-radius: 14px; padding: 20px; color: var(--text); text-align: center;
    font-size: 32px; font-family: 'Dancing Script', cursive;
    outline: none; transition: border-color 0.15s;
}
.p-sig-typed:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.p-sig-typed::placeholder { color: #ccc; font-size: 20px; }
.p-sig-tabs {
    display: flex; gap: 0; margin-bottom: 14px;
    background: var(--card2); border-radius: 12px; padding: 4px;
    border: 1px solid var(--border);
}
.p-sig-tab {
    flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    background: transparent; color: var(--text3); transition: all 0.2s;
}
.p-sig-tab.active { background: var(--accent); color: white; box-shadow: var(--shadow-sm); }

/* Action buttons */
.p-actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 16px; z-index: 200;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.p-actions-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; gap: 8px; align-items: center;
}
.p-btn {
    padding: 14px 20px; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s; display: flex;
    align-items: center; gap: 6px; justify-content: center;
    -webkit-tap-highlight-color: transparent;
}
.p-btn:active { transform: scale(0.97); }
.p-btn-accept {
    flex: 1; background: var(--green); color: white;
    box-shadow: 0 4px 16px rgba(5,150,105,0.25);
}
.p-btn-accept:hover { background: #047857; }
.p-btn-decline {
    background: #fef2f2; color: var(--red);
    border: 1px solid rgba(220,38,38,0.15);
}
.p-btn-decline:hover { background: #fee2e2; }
.p-btn-pdf {
    background: var(--card2); color: var(--text2);
    border: 1px solid var(--border);
}
.p-btn-pdf:hover { background: #e5e7eb; }

/* Signed / locked state */
.portal-signed-banner {
    background: var(--green-light);
    border: 1px solid rgba(5,150,105,0.15);
    border-radius: var(--radius); padding: 24px; text-align: center;
    margin-bottom: 12px; box-shadow: var(--shadow-sm);
}
.portal-signed-banner .icon { font-size: 40px; margin-bottom: 8px; display: block; }
.portal-signed-banner h3 { color: var(--green); font-size: 18px; margin-bottom: 6px; font-weight: 700; }
.portal-signed-banner p { color: var(--text3); font-size: 14px; line-height: 1.5; }

/* Signature proof display */
.p-sig-proof {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid rgba(5,150,105,0.12);
}
.p-sig-proof img {
    max-width: 280px; max-height: 100px; margin: 0 auto;
    display: block; filter: contrast(1.2);
}
.p-sig-proof-typed {
    font-family: 'Dancing Script', cursive; font-size: 32px;
    color: #1a202c; margin: 8px 0;
}
.p-sig-proof-meta {
    font-size: 11px; color: var(--text3); margin-top: 8px;
    line-height: 1.6;
}
.p-receipt-id {
    display: inline-block; background: rgba(5,150,105,0.08);
    padding: 4px 12px; border-radius: 8px;
    font-size: 11px; font-weight: 700; color: var(--green);
    letter-spacing: 0.5px; margin-top: 12px;
}

/* View tracker */
.p-views {
    font-size: 12px; color: var(--text3); text-align: center;
    padding: 16px 0; margin-top: 8px;
}

/* Responsive — mobile first */
@media (max-width: 480px) {
    .portal-banner-inner { padding: 12px 16px; }
    .portal-brand h1 { font-size: 13px; }
    .portal-brand p { font-size: 10px; }
    .portal-brand-icon { width: 36px; height: 36px; font-size: 15px; }
    .portal-status-pill { font-size: 9px; padding: 4px 10px; }
    .portal-hero { padding: 24px 16px 0; }
    .portal-hero h2 { font-size: 22px; }
    .portal-hero p { font-size: 13px; }
    .p-card { padding: 16px; border-radius: 14px; }
    .p-info-grid { grid-template-columns: 1fr; gap: 8px; }
    .p-info-box { padding: 12px; }
    .p-info-value { font-size: 13px; }
    .p-totals { grid-template-columns: 1fr 1fr; gap: 8px; }
    .p-total-value { font-size: 18px !important; }
    .p-total-box { padding: 14px 8px; }
    .p-line-item { padding: 12px; }
    .p-line-desc { font-size: 13px; }
    .p-line-amount { font-size: 14px; }
    .p-line-detail { padding-left: 34px; font-size: 11px; }
    .p-scope-list li { font-size: 13px; gap: 10px; }
    .p-scope-check { width: 22px; height: 22px; }
    .p-sig-canvas { height: 140px; }
    .p-actions { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    .p-actions-inner { flex-wrap: wrap; }
    .p-btn { font-size: 14px; padding: 12px 16px; }
    .p-btn-accept { flex: 1 1 100%; order: -1; }
    .p-btn-decline, .p-btn-pdf { flex: 1; }
}

@media (min-width: 481px) and (max-width: 768px) {
    .p-info-grid { grid-template-columns: 1fr 1fr; }
    .p-totals { grid-template-columns: 1fr 1fr; }
}

/* Print */
@media print {
    .portal-banner, .p-actions, .p-qa-input-row, #qaSection, .p-views { display: none !important; }
    body { background: white; color: #1a1a1a; font-size: 12px; }
    .portal-body { padding: 0 8px 20px; }
    .p-card { border: 1px solid #ddd; break-inside: avoid; box-shadow: none; margin-bottom: 8px; }
    .p-total-grand { background: #f0f7ff; }
    .portal-hero { padding-top: 0; }
    .portal-signed-banner { break-inside: avoid; }
    .p-sig-proof img { max-width: 200px; filter: contrast(1.5); }
    .p-receipt-header { display: block !important; text-align: center; padding: 20px 0 10px; border-bottom: 2px solid #1a1a1a; margin-bottom: 16px; }
    .p-receipt-header h2 { font-size: 18px; margin-bottom: 4px; }
    .p-receipt-header p { font-size: 11px; color: #666; }
}
</style>
</head>
<body>

<div id="portalRoot">
    <div class="portal-loading" id="portalLoading">
        <div class="spinner"></div>
        <p style="color:var(--text3);font-size:13px">Loading your estimate...</p>
    </div>
</div>

<script>
(function() {
'use strict';

// ================================================================
// FIREBASE CONFIG
// ================================================================
var firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY_HERE",
    authDomain: "wsi---bid-generator.firebaseapp.com",
    databaseURL: "https://wsi---bid-generator-default-rtdb.firebaseio.com",
    projectId: "wsi---bid-generator",
    storageBucket: "wsi---bid-generator.firebasestorage.app",
    messagingSenderId: "613129301141",
    appId: "1:613129301141:web:92405028eca5aae354bf9c"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ================================================================
// PARSE URL PARAMS
// ================================================================
var params = new URLSearchParams(window.location.search);
var invoiceId = params.get('id');
var ownerPin = params.get('pin');
var authToken = params.get('token');

if (!invoiceId || !ownerPin) {
    showError('Invalid Link', 'This estimate link is missing required parameters. Please contact the contractor for a new link.');
    return;
}

// ================================================================
// LOAD INVOICE
// ================================================================
var invoice = null;
var portalRef = db.ref('portal/' + ownerPin + '/' + invoiceId);
var messagesRef = portalRef.child('messages');

portalRef.once('value').then(function(snap) {
    var data = snap.val();
    if (!data || !data.invoice) {
        // Try loading from invoices path as fallback
        return loadFromInvoicesPath();
    }
    invoice = data.invoice;
    invoice._portalData = data;
    renderPortal();
    trackView();
    listenForMessages();
}).catch(function(err) {
    console.error('Portal load error:', err);
    loadFromInvoicesPath();
});

function loadFromInvoicesPath() {
    var statuses = ['temporary', 'permanent', 'lost'];
    var found = false;
    var checks = 0;
    statuses.forEach(function(status) {
        db.ref('invoices/' + ownerPin + '/' + status + '/' + invoiceId).once('value').then(function(snap) {
            checks++;
            if (snap.val() && !found) {
                found = true;
                invoice = snap.val();
                renderPortal();
                trackView();
                listenForMessages();
            } else if (checks >= statuses.length && !found) {
                showError('Estimate Not Found', 'This estimate may have expired or been removed. Please contact the contractor for an updated link.');
            }
        });
    });
}

// ================================================================
// TRACK VIEWS
// ================================================================
function trackView() {
    var viewData = {
        at: new Date().toISOString(),
        ua: navigator.userAgent.substring(0, 120),
        screen: screen.width + 'x' + screen.height,
        ref: document.referrer || 'direct'
    };
    portalRef.child('views').push(viewData);
    portalRef.child('lastViewedAt').set(viewData.at);
    portalRef.child('viewCount').transaction(function(c) { return (c || 0) + 1; });

    // Track time spent
    var startTime = Date.now();
    var maxScroll = 0;
    window.addEventListener('scroll', function() {
        var pct = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
        if (pct > maxScroll) maxScroll = pct;
    });
    window.addEventListener('beforeunload', function() {
        var seconds = Math.round((Date.now() - startTime) / 1000);
        portalRef.child('engagement').push({
            duration: seconds,
            scrollDepth: maxScroll,
            at: new Date().toISOString()
        });
    });
}

// ================================================================
// RENDER PORTAL
// ================================================================
function renderPortal() {
    var loadEl = document.getElementById('portalLoading');
    if (loadEl) loadEl.style.display = 'none';

    // Determine brand
    var brandKey = invoice.brand || invoice.brandSelect || 'wsi';
    var isATP = brandKey === 'atp';
    var brandName = isATP ? 'Watts ATP Contractor' : (invoice.companyInfo && invoice.companyInfo.companyName) || 'Watts Safety Installs';
    var accentColor = isATP ? '#00C4B4' : '#059669';
    var accentBg = isATP ? 'rgba(0,196,180,0.08)' : 'rgba(5,150,105,0.08)';
    var headerBg = isATP ? '#0A1D37' : '#1a1a1a';
    var headerText = '#ffffff';
    var license = (invoice.companyInfo && invoice.companyInfo.licenseNum) || '#54690-25';
    var phone = (invoice.companyInfo && invoice.companyInfo.phone) || '(405) 410-6402';
    var email = (invoice.companyInfo && invoice.companyInfo.email) || 'Justin.Watts@WattsATPContractor.com';
    var isSigned = invoice._portalData && invoice._portalData.signedAt;

// ================================================================
// SIGNATURE PAD
// ================================================================
var sigDrawing = false, sigHasData = false;
var _sigCtx = null;

function initSigCanvas() {
    var c = document.getElementById('sigCanvas');
    if (!c) { console.warn('Signature canvas not found'); return; }
    var wrap = document.getElementById('sigCanvasWrap');

    // Set canvas resolution based on actual display size
    var rect = c.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;

    var ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    _sigCtx = ctx;

    function pos(e) {
        var r = c.getBoundingClientRect();
        var touch = e.touches ? e.touches[0] : e;
        return {
            x: (touch.clientX - r.left),
            y: (touch.clientY - r.top)
        };
    }

    function startDraw(e) {
        sigDrawing = true;
        ctx.beginPath();
        var p = pos(e);
        ctx.moveTo(p.x, p.y);
        if (wrap) wrap.classList.add('active');
    }

    function moveDraw(e) {
        if (!sigDrawing) return;
        var p = pos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        sigHasData = true;
        if (wrap) wrap.classList.add('has-data');
    }

    function endDraw() {
        sigDrawing = false;
        if (wrap) wrap.classList.remove('active');
    }

    // Mouse events
    c.addEventListener('mousedown', startDraw);
    c.addEventListener('mousemove', moveDraw);
    c.addEventListener('mouseup', endDraw);
    c.addEventListener('mouseleave', endDraw);

    // Touch events — critical for mobile
    c.addEventListener('touchstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        startDraw(e);
    }, { passive: false });
    c.addEventListener('touchmove', function(e) {
        e.preventDefault();
        e.stopPropagation();
        moveDraw(e);
    }, { passive: false });
    c.addEventListener('touchend', function(e) {
        e.preventDefault();
        endDraw();
    }, { passive: false });
    c.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        endDraw();
    }, { passive: false });

    console.log('Signature canvas initialized:', rect.width + 'x' + rect.height, 'dpr:' + dpr);
}

window.clearSig = function() {
    var c = document.getElementById('sigCanvas');
    if (!c) return;
    var ctx = c.getContext('2d');
    ctx.clearRect(0, 0, c.width, c.height);
    sigHasData = false;
    var wrap = document.getElementById('sigCanvasWrap');
    if (wrap) wrap.classList.remove('has-data');
};

window.switchSigTab = function(tab) {
    var drawTab = document.getElementById('sigTabDraw');
    var typeTab = document.getElementById('sigTabType');
    var drawArea = document.getElementById('sigDrawArea');
    var typeArea = document.getElementById('sigTypeArea');
    if (drawTab) drawTab.classList.toggle('active', tab === 'draw');
    if (typeTab) typeTab.classList.toggle('active', tab === 'type');
    if (drawArea) drawArea.style.display = tab === 'draw' ? 'block' : 'none';
    if (typeArea) typeArea.style.display = tab === 'type' ? 'block' : 'none';
    // Re-init canvas when switching back to draw (fixes sizing)
    if (tab === 'draw') setTimeout(initSigCanvas, 100);
};

window.showSignSection = function() {
    var sec = document.getElementById('sigSection');
    if (sec) {
        sec.style.display = 'block';
        sec.scrollIntoView({ behavior: 'smooth', block: 'center' });
        // Init canvas after section becomes visible
        setTimeout(initSigCanvas, 350);
    }
};

// ================================================================
// SIGN / ACCEPT
// ================================================================
window.portalSign = function() {
    var nameEl = document.getElementById('sigName');
    if (!nameEl) { alert('Signature form not found. Please refresh and try again.'); return; }
    var name = (nameEl.value || '').trim();
    if (!name) { alert('Please enter your full name.'); nameEl.focus(); return; }

    // Determine which signature mode is active
    var sigData = '';
    var sigType = 'draw';
    var drawArea = document.getElementById('sigDrawArea');
    var typeArea = document.getElementById('sigTypeArea');
    var isDrawMode = drawArea && drawArea.style.display !== 'none';
    var isTypeMode = typeArea && typeArea.style.display !== 'none';

    if (isTypeMode && !isDrawMode) {
        // Type mode
        sigType = 'type';
        var typedInput = document.getElementById('sigTyped');
        sigData = typedInput ? (typedInput.value || '').trim() : '';
        if (!sigData) { alert('Please type your signature.'); if (typedInput) typedInput.focus(); return; }
    } else {
        // Draw mode (default)
        var c = document.getElementById('sigCanvas');
        if (!sigHasData || !c) { alert('Please draw your signature on the pad.'); return; }
        sigData = c.toDataURL('image/png');
    }

    // Disable button to prevent double-submit
    var submitBtn = document.querySelector('#sigSection .p-btn-accept');
    if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';
        submitBtn.style.opacity = '0.6';
    }

    var signPayload = {
        signerName: name,
        signatureData: sigData,
        signatureType: sigType,
        signedAt: new Date().toISOString(),
        userAgent: navigator.userAgent.substring(0, 120)
    };

    // Save a permanent snapshot of the invoice alongside signature
    // This means the client's receipt link will ALWAYS work, even if
    // the contractor later edits or deletes the original invoice
    var snapshot = {
        clientName: invoice.clientName,
        amount: invoice.amount,
        laborTotal: invoice.laborTotal,
        materialsTotal: invoice.materialsTotal,
        estimateDate: invoice.estimateDate,
        scopeItems: invoice.scope || invoice.scopeItems || [],
        laborItems: invoice.laborItems || [],
        materialItems: invoice.materialItems || invoice.matItems || [],
        notes: invoice.notes || invoice.noteItems || [],
        companyInfo: invoice.companyInfo || {},
        brand: invoice.brand || invoice.brandSelect || 'wsi',
        jobDetails: invoice.jobDetails || {}
    };
    signPayload.invoiceSnapshot = snapshot;

    portalRef.update(signPayload).then(function() {
        // Also update the invoice status to permanent
        var statuses = ['temporary', 'permanent', 'lost'];
        statuses.forEach(function(s) {
            db.ref('invoices/' + ownerPin + '/' + s + '/' + invoiceId).once('value').then(function(snap) {
                if (snap.val()) {
                    var inv = snap.val();
                    inv.contractLink = inv.contractLink || {};
                    inv.contractLink.status = 'signed';
                    inv.contractLink.signedAt = signPayload.signedAt;
                    inv.contractLink.signerName = name;
                    inv.contractLink.signatureData = sigData;
                    inv.contractLink.signatureType = sigType;
                    if (s === 'temporary') {
                        inv.status = 'permanent';
                        inv.awardedDate = signPayload.signedAt;
                        db.ref('invoices/' + ownerPin + '/permanent/' + invoiceId).set(inv);
                        db.ref('invoices/' + ownerPin + '/temporary/' + invoiceId).remove();
                    } else {
                        db.ref('invoices/' + ownerPin + '/' + s + '/' + invoiceId).set(inv);
                    }
                }
            });
        });

        // Re-render with signed state (wrapped in try/catch so render errors don't show as save errors)
        try {
            invoice._portalData = invoice._portalData || {};
            invoice._portalData.signedAt = signPayload.signedAt;
            invoice._portalData.signerName = name;
            invoice._portalData.signatureData = sigData;
            invoice._portalData.signatureType = sigType;
            renderPortal();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch(renderErr) {
            console.warn('Re-render after sign:', renderErr);
            window.location.reload();
        }
    }).catch(function(err) {
        console.error('Signature save error:', err);
        alert('Error saving signature: ' + err.message);
        var btn = document.querySelector('#sigSection .p-btn-accept');
        if (btn) {
            btn.disabled = false;
            btn.textContent = '✅ Accept & Sign Estimate';
            btn.style.opacity = '1';
        }
    });
};

window.portalDecline = function() {
    var reason = prompt('Optional: Why are you declining this estimate?');
    portalRef.update({
        declinedAt: new Date().toISOString(),
        declineReason: reason || ''
    }).then(function() {
        try {
            invoice._portalData = invoice._portalData || {};
            invoice._portalData.declinedAt = new Date().toISOString();
            renderPortal();
            window.scrollTo({top:0,behavior:'smooth'});
        } catch(e) {
            console.warn('Re-render after decline:', e);
            window.location.reload();
        }
    }).catch(function(err) {
        console.error('Decline error:', err);
        alert('Error: ' + err.message);
    });
};

// ================================================================
// Q&A MESSAGING
// ================================================================
function listenForMessages() {
    messagesRef.orderByChild('at').on('child_added', function(snap) {
        var msg = snap.val();
        var thread = document.getElementById('qaThread');
        if (!thread) return;
        // Clear placeholder
        var placeholder = thread.querySelector('div[style*="text-align:center"]');
        if (placeholder) placeholder.remove();

        var div = document.createElement('div');
        div.className = 'p-qa-msg ' + (msg.from === 'client' ? 'client' : 'contractor');
        div.innerHTML = esc(msg.text) + '<div class="p-qa-meta">' + (msg.from === 'client' ? 'You' : esc(msg.fromName || 'Contractor')) + ' · ' + timeAgo(msg.at) + '</div>';
        thread.appendChild(div);
        thread.scrollTop = thread.scrollHeight;
    });
}

window.portalSendMessage = function() {
    var input = document.getElementById('qaInput');
    if (!input) return;
    var text = (input.value || '').trim();
    if (!text) return;
    messagesRef.push({
        from: 'client',
        fromName: invoice.clientName || 'Client',
        text: text,
        at: new Date().toISOString()
    });
    input.value = '';

    // Notify contractor
    portalRef.child('unreadClient').transaction(function(c) { return (c||0)+1; });
    portalRef.child('lastClientMsg').set({ text: text.substring(0,100), at: new Date().toISOString() });
};

// ================================================================
// ERROR STATE
// ================================================================
function showError(title, msg) {
    var root = document.getElementById('portalRoot');
    if (root) root.innerHTML = '<div class="portal-error"><span class="err-icon">⚠️</span><h2>' + esc(title) + '</h2><p>' + esc(msg) + '</p></div>';
}

// ================================================================
// HELPERS
// ================================================================
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function n(v) { return (parseFloat(v)||0).toFixed(2); }
function formatDate(s) {
    if (!s) return 'N/A';
    var d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
}
function buildLocation() {
    var jd = invoice.jobDetails || {};
    var parts = [jd.complexName, jd.unitNum, jd.jobCity].filter(Boolean);
    return parts.join(', ') || 'See estimate';
}
function infoBox(label, value) {
    return '<div class="p-info-box"><div class="p-info-label">' + label + '</div><div class="p-info-value">' + esc(value) + '</div></div>';
}
function totalBox(label, value, style) {
    return '<div class="p-total-box"><div class="p-total-label">' + label + '</div><div class="p-total-value" style="' + (style||'') + '">' + value + '</div></div>';
}
function timeAgo(iso) {
    var ms = Date.now() - new Date(iso).getTime();
    var m = Math.floor(ms/60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m/60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
}

})();
</script>
