<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Estimate — Review & Sign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
:root {
    --bg: #09090b;
    --card: #18181b;
    --card2: #1c1c20;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #71717a;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* Loading state */
.portal-loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 16px;
}
.portal-loading .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error state */
.portal-error {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 12px; text-align: center; padding: 20px;
}
.portal-error h2 { font-size: 20px; color: var(--red); }
.portal-error p { color: var(--text3); font-size: 14px; max-width: 400px; }

/* Header banner */
.portal-banner {
    background: linear-gradient(135deg, #0a1628 0%, #162240 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 0;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
}
.portal-banner-inner {
    max-width: 780px; margin: 0 auto; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
}
.portal-brand { display: flex; align-items: center; gap: 12px; }
.portal-brand-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800;
}
.portal-brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.portal-brand p { font-size: 11px; color: var(--text3); margin-top: 1px; }
.portal-status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}

/* Main content */
.portal-body { max-width: 780px; margin: 0 auto; padding: 24px 20px 120px; }

/* Section card */
.p-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
}
.p-card:hover { border-color: var(--border2); }
.p-card-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
}

/* Client info grid */
.p-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.p-info-box { background: var(--card2); border-radius: 10px; padding: 14px; }
.p-info-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
.p-info-value { font-size: 15px; font-weight: 600; color: var(--text); }

/* Totals highlight */
.p-totals {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
}
.p-total-box {
    background: var(--card2); border-radius: 12px; padding: 16px; text-align: center;
}
.p-total-label { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; font-weight: 600; }
.p-total-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.p-total-grand {
    background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
    border: 1px solid rgba(59,130,246,0.2);
}
.p-total-grand .p-total-value { color: var(--accent); }

/* Scope of work */
.p-scope-list { list-style: none; padding: 0; }
.p-scope-list li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; color: var(--text); line-height: 1.5;
}
.p-scope-list li:last-child { border-bottom: none; }
.p-scope-check {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
}

/* Line items table */
.p-table { width: 100%; border-collapse: collapse; }
.p-table thead th {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text3); font-weight: 700; padding: 10px 12px;
    text-align: left; border-bottom: 1px solid var(--border2);
}
.p-table thead th:last-child,
.p-table thead th:nth-child(3),
.p-table thead th:nth-child(4),
.p-table thead th:nth-child(5) { text-align: right; }
.p-table tbody td {
    padding: 12px; font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border); vertical-align: top;
}
.p-table tbody td:last-child,
.p-table tbody td:nth-child(3),
.p-table tbody td:nth-child(4),
.p-table tbody td:nth-child(5) { text-align: right; white-space: nowrap; }
.p-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.p-table .p-row-total { font-weight: 700; }
.p-table .p-subtotal td {
    border-top: 2px solid var(--border2); font-weight: 700; padding-top: 14px;
}

/* Notes */
.p-note {
    display: flex; align-items: flex-start; gap: 8px; padding: 8px 0;
    font-size: 13px; color: var(--text2); line-height: 1.5;
}
.p-note::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 6px;
}

/* Client Q&A */
.p-qa-thread { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.p-qa-msg {
    max-width: 85%; padding: 12px 16px; border-radius: 14px;
    font-size: 13px; line-height: 1.5;
}
.p-qa-msg.client { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.p-qa-msg.contractor { align-self: flex-start; background: var(--card2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.p-qa-meta { font-size: 10px; margin-top: 4px; opacity: 0.6; }
.p-qa-input-row { display: flex; gap: 8px; }
.p-qa-input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; color: var(--text);
    font-size: 13px; font-family: inherit; resize: none; outline: none;
}
.p-qa-input:focus { border-color: var(--accent); }
.p-qa-send {
    background: var(--accent); color: white; border: none;
    padding: 0 20px; border-radius: 12px; font-weight: 700;
    font-size: 13px; cursor: pointer; transition: background 0.15s;
}
.p-qa-send:hover { background: #2563eb; }

/* Signature */
.p-sig-pad { text-align: center; }
.p-sig-canvas {
    width: 100%; height: 120px; background: white; border-radius: 10px;
    cursor: crosshair; touch-action: none; display: block;
}
.p-sig-typed {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; color: var(--text); text-align: center;
    font-size: 28px; font-family: 'Brush Script MT', 'Segoe Script', cursive;
    outline: none;
}
.p-sig-tabs {
    display: flex; gap: 4px; margin-bottom: 12px;
    background: var(--card2); border-radius: 10px; padding: 4px;
}
.p-sig-tab {
    flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: inherit;
    background: transparent; color: var(--text3); transition: all 0.15s;
}
.p-sig-tab.active { background: var(--accent); color: white; }

/* Action buttons */
.p-actions {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(9,9,11,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 20px; z-index: 200;
}
.p-actions-inner {
    max-width: 780px; margin: 0 auto;
    display: flex; gap: 10px; align-items: center;
}
.p-btn {
    padding: 12px 24px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s; display: flex;
    align-items: center; gap: 8px; justify-content: center;
}
.p-btn-accept {
    flex: 1; background: var(--green); color: white;
    box-shadow: 0 4px 16px rgba(34,197,94,0.3);
}
.p-btn-accept:hover { background: #16a34a; transform: translateY(-1px); }
.p-btn-decline {
    background: rgba(239,68,68,0.1); color: var(--red);
    border: 1px solid rgba(239,68,68,0.2);
}
.p-btn-decline:hover { background: rgba(239,68,68,0.2); }
.p-btn-pdf {
    background: var(--card); color: var(--text2);
    border: 1px solid var(--border);
}
.p-btn-pdf:hover { background: var(--card2); }
.p-btn-disabled { opacity: 0.4; pointer-events: none; }

/* Signed / locked state */
.portal-signed-banner {
    background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.05));
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: var(--radius); padding: 20px; text-align: center;
    margin-bottom: 16px;
}
.portal-signed-banner h3 { color: var(--green); font-size: 16px; margin-bottom: 4px; }
.portal-signed-banner p { color: var(--text3); font-size: 13px; }

/* View tracker */
.p-views {
    font-size: 11px; color: var(--text3); text-align: center;
    padding: 8px; border-top: 1px solid var(--border); margin-top: 20px;
}

/* Responsive */
@media (max-width: 640px) {
    .p-info-grid { grid-template-columns: 1fr; }
    .p-totals { grid-template-columns: 1fr; }
    .p-table { font-size: 12px; }
    .p-actions-inner { flex-wrap: wrap; }
    .p-btn { flex: 1 1 100%; }
    .p-btn-accept { order: -1; }
}

/* Print */
@media print {
    .portal-banner, .p-actions, .p-qa-input-row, #qaSection { display: none !important; }
    body { background: white; color: #1a1a1a; }
    .p-card { border: 1px solid #ddd; break-inside: avoid; }
    .p-total-grand { background: #f0f7ff; }
}
</style>
</head>
<body>

<div id="portalRoot">
    <div class="portal-loading" id="portalLoading">
        <div class="spinner"></div>
        <p style="color:var(--text3);font-size:13px">Loading your estimate...</p>
    </div>
</div>

<script>
(function() {
'use strict';

// ================================================================
// FIREBASE CONFIG
// ================================================================
var firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY_HERE",
    authDomain: "wsi---bid-generator.firebaseapp.com",
    databaseURL: "https://wsi---bid-generator-default-rtdb.firebaseio.com",
    projectId: "wsi---bid-generator",
    storageBucket: "wsi---bid-generator.firebasestorage.app",
    messagingSenderId: "613129301141",
    appId: "1:613129301141:web:92405028eca5aae354bf9c"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ================================================================
// PARSE URL PARAMS
// ================================================================
var params = new URLSearchParams(window.location.search);
var invoiceId = params.get('id');
var ownerPin = params.get('pin');
var authToken = params.get('token');

if (!invoiceId || !ownerPin) {
    showError('Invalid Link', 'This estimate link is missing required parameters. Please contact the contractor for a new link.');
    return;
}

// ================================================================
// LOAD INVOICE
// ================================================================
var invoice = null;
var portalRef = db.ref('portal/' + ownerPin + '/' + invoiceId);
var messagesRef = portalRef.child('messages');

portalRef.once('value').then(function(snap) {
    var data = snap.val();
    if (!data || !data.invoice) {
        // Try loading from invoices path as fallback
        return loadFromInvoicesPath();
    }
    invoice = data.invoice;
    invoice._portalData = data;
    renderPortal();
    trackView();
    listenForMessages();
}).catch(function(err) {
    console.error('Portal load error:', err);
    loadFromInvoicesPath();
});

function loadFromInvoicesPath() {
    var statuses = ['temporary', 'permanent', 'lost'];
    var found = false;
    var checks = 0;
    statuses.forEach(function(status) {
        db.ref('invoices/' + ownerPin + '/' + status + '/' + invoiceId).once('value').then(function(snap) {
            checks++;
            if (snap.val() && !found) {
                found = true;
                invoice = snap.val();
                renderPortal();
                trackView();
                listenForMessages();
            } else if (checks >= statuses.length && !found) {
                showError('Estimate Not Found', 'This estimate may have expired or been removed. Please contact the contractor for an updated link.');
            }
        });
    });
}

// ================================================================
// TRACK VIEWS
// ================================================================
function trackView() {
    var viewData = {
        at: new Date().toISOString(),
        ua: navigator.userAgent.substring(0, 120),
        screen: screen.width + 'x' + screen.height,
        ref: document.referrer || 'direct'
    };
    portalRef.child('views').push(viewData);
    portalRef.child('lastViewedAt').set(viewData.at);
    portalRef.child('viewCount').transaction(function(c) { return (c || 0) + 1; });

    // Track time spent
    var startTime = Date.now();
    var maxScroll = 0;
    window.addEventListener('scroll', function() {
        var pct = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
        if (pct > maxScroll) maxScroll = pct;
    });
    window.addEventListener('beforeunload', function() {
        var seconds = Math.round((Date.now() - startTime) / 1000);
        portalRef.child('engagement').push({
            duration: seconds,
            scrollDepth: maxScroll,
            at: new Date().toISOString()
        });
    });
}

// ================================================================
// RENDER PORTAL
// ================================================================
function renderPortal() {
    document.getElementById('portalLoading').style.display = 'none';

    // Determine brand
    var brandKey = invoice.brand || invoice.brandSelect || 'wsi';
    var isATP = brandKey === 'atp';
    var brandName = isATP ? 'Watts ATP Contractor' : (invoice.companyInfo && invoice.companyInfo.companyName) || 'Watts Safety Installs';
    var accentColor = isATP ? '#00C4B4' : '#dc2626';
    var headerBg = isATP ? 'linear-gradient(135deg,#0A1D37,#162a52)' : 'linear-gradient(135deg,#1a1a1a,#2d2d2d)';
    var license = (invoice.companyInfo && invoice.companyInfo.licenseNum) || '#54690-25';
    var phone = (invoice.companyInfo && invoice.companyInfo.phone) || '(405) 410-6402';
    var email = (invoice.companyInfo && invoice.companyInfo.email) || 'Justin.Watts@WattsATPContractor.com';
    var isSigned = invoice._portalData && invoice._portalData.signedAt;
    var isDeclined = invoice._portalData && invoice._portalData.declinedAt;

    // Page title
    document.title = 'Estimate for ' + (invoice.clientName || 'Client') + ' — ' + brandName;

    // Status
    var statusHTML = '';
    if (isSigned) {
        statusHTML = '<div class="portal-status-pill" style="background:rgba(34,197,94,0.15);color:#22c55e">✓ ACCEPTED & SIGNED</div>';
    } else if (isDeclined) {
        statusHTML = '<div class="portal-status-pill" style="background:rgba(239,68,68,0.15);color:#ef4444">DECLINED</div>';
    } else {
        statusHTML = '<div class="portal-status-pill" style="background:rgba(251,191,36,0.15);color:#fbbf24">AWAITING REVIEW</div>';
    }

    // Build HTML
    var h = '';

    // ── BANNER ──
    h += '<div class="portal-banner" style="background:' + headerBg + '">';
    h += '<div class="portal-banner-inner">';
    h += '<div class="portal-brand">';
    h += '<div class="portal-brand-icon" style="background:' + accentColor + ';color:white">' + brandName.charAt(0) + '</div>';
    h += '<div><h1 style="color:white">' + esc(brandName) + '</h1>';
    h += '<p>Nebraska Licensed Contractor — ' + esc(license) + '</p></div></div>';
    h += statusHTML;
    h += '</div></div>';

    // ── BODY ──
    h += '<div class="portal-body">';

    // Signed banner
    if (isSigned) {
        h += '<div class="portal-signed-banner">';
        h += '<h3>✅ This estimate has been accepted and signed</h3>';
        h += '<p>Signed by ' + esc(invoice._portalData.signerName || 'Client') + ' on ' + new Date(invoice._portalData.signedAt).toLocaleString() + '</p>';
        h += '</div>';
    }
    if (isDeclined) {
        h += '<div class="portal-signed-banner" style="border-color:rgba(239,68,68,0.2);background:linear-gradient(135deg,rgba(239,68,68,0.1),rgba(239,68,68,0.05))">';
        h += '<h3 style="color:var(--red)">This estimate was declined</h3>';
        h += '<p>If you\'d like to discuss changes, use the message section below or call ' + esc(phone) + '</p>';
        h += '</div>';
    }

    // ── CLIENT & PROJECT INFO ──
    h += '<div class="p-card">';
    h += '<div class="p-card-title">📋 Estimate Details</div>';
    h += '<div class="p-info-grid">';
    h += infoBox('Prepared For', invoice.clientName || 'Client');
    h += infoBox('Estimate Date', formatDate(invoice.estimateDate));
    h += infoBox('Project Location', buildLocation());
    h += infoBox('Invoice #', invoice.id || invoiceId);
    h += infoBox('Valid Until', invoice.expiresDate ? formatDate(invoice.expiresDate) : '30 days');
    h += infoBox('Contact', phone);
    h += '</div></div>';

    // ── TOTALS ──
    var laborTotal = invoice.laborTotal || 0;
    var materialsTotal = invoice.materialsTotal || 0;
    var grandTotal = invoice.amount || (laborTotal + materialsTotal);

    h += '<div class="p-card">';
    h += '<div class="p-card-title">💰 Project Total</div>';
    h += '<div class="p-totals">';
    h += totalBox('Labor', '$' + n(laborTotal), 'color:var(--accent)');
    h += totalBox('Materials', '$' + n(materialsTotal), 'color:var(--green)');
    h += '<div class="p-total-box p-total-grand"><div class="p-total-label">Grand Total</div><div class="p-total-value">$' + n(grandTotal) + '</div></div>';
    h += '</div></div>';

    // ── SCOPE OF WORK ──
    var scope = invoice.jobDetails ? invoice.jobDetails.scopeItems : (invoice.scopeItems || []);
    if (scope && scope.length > 0) {
        h += '<div class="p-card">';
        h += '<div class="p-card-title">🔨 Scope of Work</div>';
        h += '<ul class="p-scope-list">';
        scope.forEach(function(item) {
            h += '<li><span class="p-scope-check" style="background:' + accentColor + '20;color:' + accentColor + '">✓</span>' + esc(item) + '</li>';
        });
        h += '</ul></div>';
    }

    // ── LABOR BREAKDOWN ──
    var laborItems = invoice.jobDetails ? invoice.jobDetails.laborItems : (invoice.laborItems || []);
    if (laborItems && laborItems.length > 0) {
        h += '<div class="p-card">';
        h += '<div class="p-card-title">👷 Labor Breakdown</div>';
        h += '<table class="p-table"><thead><tr><th>#</th><th>Description</th><th>Basis</th><th>Rate</th><th>Total</th></tr></thead><tbody>';
        var lSub = 0;
        laborItems.forEach(function(item, i) {
            var qty = item.qty || 1;
            var price = item.price || 0;
            var total = qty * price;
            lSub += total;
            h += '<tr><td style="color:' + accentColor + ';font-weight:700">' + (i+1) + '</td>';
            h += '<td><strong>' + esc(item.desc) + '</strong></td>';
            h += '<td style="color:var(--text3)">' + esc(item.basis || '') + '</td>';
            h += '<td>$' + n(price) + '</td>';
            h += '<td class="p-row-total">$' + n(total) + '</td></tr>';
        });
        h += '<tr class="p-subtotal"><td></td><td colspan="3"><strong>Labor Subtotal</strong></td><td class="p-row-total">$' + n(lSub) + '</td></tr>';
        h += '</tbody></table></div>';
    }

    // ── MATERIALS BREAKDOWN ──
    var matItems = invoice.jobDetails ? invoice.jobDetails.matItems : (invoice.matItems || []);
    if (matItems && matItems.length > 0) {
        h += '<div class="p-card">';
        h += '<div class="p-card-title">📦 Materials Breakdown</div>';
        h += '<table class="p-table"><thead><tr><th>#</th><th>Material</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>';
        var mSub = 0;
        matItems.forEach(function(item, i) {
            var qty = item.qtyNum || parseFloat(item.qty) || 1;
            var price = item.price || 0;
            var total = qty * price;
            mSub += total;
            h += '<tr><td style="color:' + accentColor + ';font-weight:700">' + (i+1) + '</td>';
            h += '<td><strong>' + esc(item.desc) + '</strong></td>';
            h += '<td>' + esc(item.qty || qty + '') + '</td>';
            h += '<td>$' + n(price) + '</td>';
            h += '<td class="p-row-total">$' + n(total) + '</td></tr>';
        });
        h += '<tr class="p-subtotal"><td></td><td colspan="3"><strong>Materials Subtotal</strong></td><td class="p-row-total">$' + n(mSub) + '</td></tr>';
        h += '</tbody></table></div>';
    }

    // ── NOTES ──
    var notes = invoice.jobDetails ? invoice.jobDetails.noteItems : (invoice.noteItems || []);
    if (notes && notes.length > 0) {
        h += '<div class="p-card">';
        h += '<div class="p-card-title">📝 Notes & Conditions</div>';
        notes.forEach(function(note) {
            h += '<div class="p-note" style="--dot:' + accentColor + '"><span style="width:6px;height:6px;border-radius:50%;background:' + accentColor + ';flex-shrink:0;margin-top:6px"></span>' + esc(note) + '</div>';
        });
        h += '</div>';
    }

    // ── DISCLAIMER ──
    var disclaimer = invoice.jobDetails ? invoice.jobDetails.disclaimer : invoice.disclaimer;
    if (disclaimer) {
        h += '<div class="p-card" style="border-color:rgba(251,191,36,0.2);background:rgba(251,191,36,0.03)">';
        h += '<div class="p-card-title" style="color:var(--amber)">⚠️ Unforeseen Conditions</div>';
        h += '<p style="font-size:13px;color:var(--text2);line-height:1.7">' + esc(disclaimer) + '</p>';
        h += '</div>';
    }

    // ── Q&A THREAD ──
    h += '<div class="p-card" id="qaSection">';
    h += '<div class="p-card-title">💬 Questions & Comments</div>';
    h += '<div class="p-qa-thread" id="qaThread">';
    h += '<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">Have a question about this estimate? Send a message below and the contractor will be notified.</div>';
    h += '</div>';
    h += '<div class="p-qa-input-row">';
    h += '<textarea class="p-qa-input" id="qaInput" rows="1" placeholder="Ask a question about this estimate..."></textarea>';
    h += '<button class="p-qa-send" id="qaSend" onclick="portalSendMessage()">Send</button>';
    h += '</div></div>';

    // ── SIGNATURE (if not yet signed) ──
    if (!isSigned && !isDeclined) {
        h += '<div class="p-card" id="sigSection" style="display:none">';
        h += '<div class="p-card-title" style="color:var(--green)">✍️ Accept & Sign</div>';
        h += '<div style="margin-bottom:16px">';
        h += '<label class="p-info-label">Full Legal Name</label>';
        h += '<input type="text" id="sigName" placeholder="Enter your full name" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-top:4px" />';
        h += '</div>';
        h += '<div class="p-sig-tabs">';
        h += '<button class="p-sig-tab active" onclick="switchSigTab(\'draw\',this)">✏️ Draw</button>';
        h += '<button class="p-sig-tab" onclick="switchSigTab(\'type\',this)">⌨️ Type</button>';
        h += '</div>';
        h += '<div id="sigDrawArea"><canvas id="sigCanvas" class="p-sig-canvas"></canvas>';
        h += '<button onclick="clearSig()" style="margin-top:6px;background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;font-family:inherit">Clear signature</button></div>';
        h += '<div id="sigTypeArea" style="display:none"><input type="text" id="sigTyped" class="p-sig-typed" placeholder="Type your name" /></div>';
        h += '<button class="p-btn p-btn-accept" style="width:100%;margin-top:16px" onclick="portalSign()">✅ Accept & Sign This Estimate</button>';
        h += '</div>';
    }

    // View count
    var vc = (invoice._portalData && invoice._portalData.viewCount) || 0;
    h += '<div class="p-views">This estimate has been viewed ' + (vc + 1) + ' time' + (vc > 0 ? 's' : '') + '</div>';

    // Footer
    h += '<div style="text-align:center;padding:20px 0;font-size:11px;color:var(--text3)">';
    h += esc(brandName) + ' — Nebraska Licensed Contractor ' + esc(license);
    h += '<br>' + esc(phone) + ' | ' + esc(email);
    h += '<br><span style="opacity:0.4">Powered by BidGen Pro</span>';
    h += '</div>';

    h += '</div>'; // end portal-body

    // ── BOTTOM ACTION BAR ──
    if (!isSigned && !isDeclined) {
        h += '<div class="p-actions"><div class="p-actions-inner">';
        h += '<button class="p-btn p-btn-pdf" onclick="window.print()">📄 PDF</button>';
        h += '<button class="p-btn p-btn-decline" onclick="portalDecline()">Decline</button>';
        h += '<button class="p-btn p-btn-accept" onclick="showSignSection()">✅ Accept Estimate</button>';
        h += '</div></div>';
    } else {
        h += '<div class="p-actions"><div class="p-actions-inner">';
        h += '<button class="p-btn p-btn-pdf" style="flex:1" onclick="window.print()">📄 Download PDF</button>';
        h += '<a href="tel:' + phone.replace(/[^\d+]/g,'') + '" class="p-btn" style="flex:1;background:var(--accent);color:white;text-decoration:none;text-align:center">📞 Call Contractor</a>';
        h += '</div></div>';
    }

    document.getElementById('portalRoot').innerHTML = h;

    // Init signature canvas
    if (!isSigned && !isDeclined) {
        setTimeout(initSigCanvas, 200);
    }
}

// ================================================================
// SIGNATURE PAD
// ================================================================
var sigDrawing = false, sigHasData = false;
function initSigCanvas() {
    var c = document.getElementById('sigCanvas');
    if (!c) return;
    var ctx = c.getContext('2d');
    var rect = c.getBoundingClientRect();
    c.width = rect.width * 2;
    c.height = rect.height * 2;
    ctx.scale(2, 2);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function pos(e) {
        var r = c.getBoundingClientRect();
        var t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
    }
    c.addEventListener('mousedown', function(e) { sigDrawing=true; ctx.beginPath(); var p=pos(e); ctx.moveTo(p.x,p.y); });
    c.addEventListener('mousemove', function(e) { if(!sigDrawing)return; var p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); sigHasData=true; });
    c.addEventListener('mouseup', function() { sigDrawing=false; });
    c.addEventListener('mouseleave', function() { sigDrawing=false; });
    c.addEventListener('touchstart', function(e) { e.preventDefault(); sigDrawing=true; ctx.beginPath(); var p=pos(e); ctx.moveTo(p.x,p.y); }, {passive:false});
    c.addEventListener('touchmove', function(e) { e.preventDefault(); if(!sigDrawing)return; var p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); sigHasData=true; }, {passive:false});
    c.addEventListener('touchend', function(e) { e.preventDefault(); sigDrawing=false; }, {passive:false});
}

window.clearSig = function() {
    var c = document.getElementById('sigCanvas');
    if (c) { var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); sigHasData=false; }
};

window.switchSigTab = function(tab, btn) {
    document.querySelectorAll('.p-sig-tab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('sigDrawArea').style.display = tab === 'draw' ? 'block' : 'none';
    document.getElementById('sigTypeArea').style.display = tab === 'type' ? 'block' : 'none';
};

window.showSignSection = function() {
    var sec = document.getElementById('sigSection');
    if (sec) { sec.style.display = 'block'; sec.scrollIntoView({behavior:'smooth'}); }
};

// ================================================================
// SIGN / ACCEPT
// ================================================================
window.portalSign = function() {
    var name = (document.getElementById('sigName').value || '').trim();
    if (!name) { alert('Please enter your full name.'); document.getElementById('sigName').focus(); return; }

    var sigData = '';
    var sigType = 'draw';
    var typedInput = document.getElementById('sigTyped');
    var drawArea = document.getElementById('sigDrawArea');

    if (drawArea && drawArea.style.display !== 'none') {
        var c = document.getElementById('sigCanvas');
        if (!sigHasData) { alert('Please draw your signature on the pad.'); return; }
        sigData = c.toDataURL('image/png');
    } else {
        sigType = 'type';
        sigData = typedInput ? typedInput.value.trim() : '';
        if (!sigData) { alert('Please type your signature.'); return; }
    }

    // Save to Firebase
    var signPayload = {
        signerName: name,
        signatureData: sigData,
        signatureType: sigType,
        signedAt: new Date().toISOString(),
        userAgent: navigator.userAgent.substring(0,120)
    };

    portalRef.update(signPayload).then(function() {
        // Also update the invoice status to permanent
        var statuses = ['temporary','permanent','lost'];
        statuses.forEach(function(s) {
            db.ref('invoices/' + ownerPin + '/' + s + '/' + invoiceId).once('value').then(function(snap) {
                if (snap.val()) {
                    var inv = snap.val();
                    inv.contractLink = inv.contractLink || {};
                    inv.contractLink.status = 'signed';
                    inv.contractLink.signedAt = signPayload.signedAt;
                    inv.contractLink.signerName = name;
                    inv.contractLink.signatureData = sigData;
                    inv.contractLink.signatureType = sigType;
                    // Move to permanent if temporary
                    if (s === 'temporary') {
                        inv.status = 'permanent';
                        inv.awardedDate = signPayload.signedAt;
                        db.ref('invoices/' + ownerPin + '/permanent/' + invoiceId).set(inv);
                        db.ref('invoices/' + ownerPin + '/temporary/' + invoiceId).remove();
                    } else {
                        db.ref('invoices/' + ownerPin + '/' + s + '/' + invoiceId).set(inv);
                    }
                }
            });
        });

        // Reload page to show signed state
        invoice._portalData = invoice._portalData || {};
        invoice._portalData.signedAt = signPayload.signedAt;
        invoice._portalData.signerName = name;
        renderPortal();
        window.scrollTo({top:0,behavior:'smooth'});
    }).catch(function(err) {
        alert('Error saving signature: ' + err.message);
    });
};

// ================================================================
// DECLINE
// ================================================================
window.portalDecline = function() {
    var reason = prompt('Optional: Why are you declining this estimate?');
    portalRef.update({
        declinedAt: new Date().toISOString(),
        declineReason: reason || ''
    }).then(function() {
        invoice._portalData = invoice._portalData || {};
        invoice._portalData.declinedAt = new Date().toISOString();
        renderPortal();
        window.scrollTo({top:0,behavior:'smooth'});
    });
};

// ================================================================
// Q&A MESSAGING
// ================================================================
function listenForMessages() {
    messagesRef.orderByChild('at').on('child_added', function(snap) {
        var msg = snap.val();
        var thread = document.getElementById('qaThread');
        if (!thread) return;
        // Clear placeholder
        var placeholder = thread.querySelector('div[style*="text-align:center"]');
        if (placeholder) placeholder.remove();

        var div = document.createElement('div');
        div.className = 'p-qa-msg ' + (msg.from === 'client' ? 'client' : 'contractor');
        div.innerHTML = esc(msg.text) + '<div class="p-qa-meta">' + (msg.from === 'client' ? 'You' : esc(msg.fromName || 'Contractor')) + ' · ' + timeAgo(msg.at) + '</div>';
        thread.appendChild(div);
        thread.scrollTop = thread.scrollHeight;
    });
}

window.portalSendMessage = function() {
    var input = document.getElementById('qaInput');
    var text = (input.value || '').trim();
    if (!text) return;
    messagesRef.push({
        from: 'client',
        fromName: invoice.clientName || 'Client',
        text: text,
        at: new Date().toISOString()
    });
    input.value = '';

    // Notify contractor
    portalRef.child('unreadClient').transaction(function(c) { return (c||0)+1; });
    portalRef.child('lastClientMsg').set({ text: text.substring(0,100), at: new Date().toISOString() });
};

// ================================================================
// ERROR STATE
// ================================================================
function showError(title, msg) {
    document.getElementById('portalRoot').innerHTML = '<div class="portal-error"><h2>' + title + '</h2><p>' + msg + '</p></div>';
}

// ================================================================
// HELPERS
// ================================================================
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function n(v) { return (parseFloat(v)||0).toFixed(2); }
function formatDate(s) {
    if (!s) return 'N/A';
    var d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
}
function buildLocation() {
    var jd = invoice.jobDetails || {};
    var parts = [jd.complexName, jd.unitNum, jd.jobCity].filter(Boolean);
    return parts.join(', ') || 'See estimate';
}
function infoBox(label, value) {
    return '<div class="p-info-box"><div class="p-info-label">' + label + '</div><div class="p-info-value">' + esc(value) + '</div></div>';
}
function totalBox(label, value, style) {
    return '<div class="p-total-box"><div class="p-total-label">' + label + '</div><div class="p-total-value" style="' + (style||'') + '">' + value + '</div></div>';
}
function timeAgo(iso) {
    var ms = Date.now() - new Date(iso).getTime();
    var m = Math.floor(ms/60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    var h = Math.floor(m/60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
}

})();
</script>
