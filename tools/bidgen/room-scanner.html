<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;overflow:hidden;touch-action:none}

<body>
<div id="launch">
<h1>📐 Room Scanner</h1>
<div class="sub">Watts Safety Installs — Spatial Measurement</div>
<button id="goAR" onclick="startAR()"><span class="ico">🥽</span>ENTER AR<span class="hint">Full spatial scanning with hand tracking</span></button>
<div id="noXR">WebXR not available. Open on Meta Quest 3 for spatial scanning.</div>
</div>
<div id="results">
<button class="xbtn" onclick="closeResults()">✕</button>

<div id="rsum"></div>
<div id="rlist"></div>
<div class="racts">
<button class="ra1" onclick="sendBidGen()">📤 BidGen</button>
<button class="ra2" onclick="fieldReport()">📄 Report</button>
<button class="ra2" onclick="copyAll()">📋 Copy</button>
<button class="ra2" onclick="aiAnalysis()">🧠 AI</button>
<button class="ra2" onclick="closeResults()">← Back</button>
</div>
</div>
<script>
(function(){
'use strict';
// ═══════════════════════════════════════════════════════════
// ROOM SCANNER v5 — TRUE SPATIAL 3D
//
// ALL visual elements rendered in WebGL inside the XR
// framebuffer: anchor markers, measurement lines, distance
// labels, hand tracers, mentor bot. Nothing is DOM overlay
// except the launch screen and post-scan results panel.
// ═══════════════════════════════════════════════════════════

var M = []; // measurements [{id,label,dist,conf,p1:{x,y,z},p2:{x,y,z}}]
var mid = 0;
var snap = null; // snapshot

// ── XR ──
var xr = {
    session:null, ref:null, gl:null, canvas:null,
    hitSrc:null, lastHit:null, pending:null,
    samples:[], sampleN:8, // 8-sample averaging for accuracy
    planes:0, planeInfo:{w:0,f:0,c:0},
    anchors:[]  // placed 3D anchor points for rendering
};

// ── GL programs ──
var prg = {}; // {line, point, sprite}
var ubo = {}; // uniform locations

// ── Hand tracking ──
var hands = { left:[], right:[], trails:[] };
var TRAIL_LEN = 20; // frames of trail history

// ── Mentor bot ──
var mentor = { pos:{x:0,y:0,z:0}, targetPos:{x:0,y:0,z:0}, visible:false };

// ── Voice ──
var voice = {
    muted:false, v:null, init:false, cd:{}, cdMs:3500,
    speaking:false
};

function initVoice(){
    if(voice.init||!window.speechSynthesis)return;
    voice.init=true;
    function pick(){
        var vs=speechSynthesis.getVoices(); if(!vs.length)return;
        var p=['google us english','microsoft mark','microsoft david','samantha'];
        for(var i=0;i<p.length;i++)for(var j=0;j<vs.length;j++)
            if(vs[j].name.toLowerCase().indexOf(p[i])>=0){voice.v=vs[j];return;}
        for(var k=0;k<vs.length;k++)if(vs[k].lang&&vs[k].lang.indexOf('en')===0){voice.v=vs[k];return;}
        voice.v=vs[0];
    }
    pick();
    if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=pick;
}
initVoice();

function say(t,cat,pri){
    if(voice.muted||!window.speechSynthesis||!t)return;
    cat=cat||'g'; pri=pri||'n';
    var now=Date.now();
    if(voice.cd[cat]&&(now-voice.cd[cat])<voice.cdMs&&pri!=='c')return;
    voice.cd[cat]=now;
    if(pri==='c'&&speechSynthesis.speaking)speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(t);
    if(voice.v)u.voice=voice.v;
    u.rate=1.1;u.pitch=1.0;u.volume=0.9;
    u.onstart=function(){voice.speaking=true;};
    u.onend=function(){voice.speaking=false;};
    u.onerror=function(){voice.speaking=false;};
    speechSynthesis.speak(u);
}

// ── Format ──
function fmt(inches){
    if(!inches||inches<=0)return"0'";
    var ft=Math.floor(inches/12),inc=Math.round(inches%12);
    if(inc===12){ft++;inc=0;}
    return ft+"'"+(inc>0?' '+inc+'"':'');
}
function fmtFt(i){return(i/12).toFixed(2)+' ft';}
function conf(hu,dm,dy){
    var s=100;if(!hu)s-=35;if(dm>8)s-=15;if(dm>15)s-=15;
    if(Math.abs(dy)>.5)s-=10;if(dm<.1)s-=40;
    return Math.max(10,Math.min(100,s));
}

// ── Auto save ──
function save(){try{localStorage.setItem('rs5',JSON.stringify({M:M,mid:mid,t:Date.now()}));}catch(e){}}
function recover(){
    try{var d=JSON.parse(localStorage.getItem('rs5'));
    if(d&&d.M&&d.M.length&&(Date.now()-d.t)<86400000){
        M=d.M;mid=d.mid||0;
        say('Recovered '+M.length+' measurements from last session.','rec','h');
    }}catch(e){}
}

// ═══ WEBGL SHADER SETUP ═══
var VS_LINE = `
attribute vec3 aPos;
uniform mat4 uVP;
void main(){ gl_Position = uVP * vec4(aPos, 1.0); }
`;
var FS_LINE = `
precision mediump float;
uniform vec4 uColor;
void main(){ gl_FragColor = uColor; }
`;
var VS_POINT = `
attribute vec3 aPos;
uniform mat4 uVP;
uniform float uSize;
void main(){
    gl_Position = uVP * vec4(aPos, 1.0);
    gl_PointSize = uSize;
}
`;
var FS_POINT = `
precision mediump float;
uniform vec4 uColor;
void main(){
    float d = distance(gl_PointCoord, vec2(0.5));
    if(d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.35, d);
    gl_FragColor = vec4(uColor.rgb, uColor.a * alpha);
}
`;
var VS_SPRITE = `
attribute vec3 aPos;
attribute vec2 aUV;
uniform mat4 uVP;
uniform vec3 uOffset;
uniform float uScale;
varying vec2 vUV;
void main(){
    vec3 p = aPos * uScale + uOffset;
    gl_Position = uVP * vec4(p, 1.0);
    vUV = aUV;
}
`;
var FS_SPRITE = `
precision mediump float;
uniform vec4 uColor;
varying vec2 vUV;
void main(){
    gl_FragColor = uColor;
}
`;

function compileShader(gl, src, type){
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.error('Shader:', gl.getShaderInfoLog(s));
        gl.deleteShader(s); return null;
    }
    return s;
}
function makeProgram(gl, vs, fs){
    var v = compileShader(gl, vs, gl.VERTEX_SHADER);
    var f = compileShader(gl, fs, gl.FRAGMENT_SHADER);
    if(!v||!f) return null;
    var p = gl.createProgram();
    gl.attachShader(p, v); gl.attachShader(p, f);
    gl.linkProgram(p);
    if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
        console.error('Program:', gl.getProgramInfoLog(p)); return null;
    }
    return p;
}

function initGL(gl){
    // Line program
    prg.line = makeProgram(gl, VS_LINE, FS_LINE);
    prg.lineVP = gl.getUniformLocation(prg.line, 'uVP');
    prg.lineColor = gl.getUniformLocation(prg.line, 'uColor');
    prg.linePos = gl.getAttribLocation(prg.line, 'aPos');

    // Point program (anchors, hand joints)
    prg.point = makeProgram(gl, VS_POINT, FS_POINT);
    prg.pointVP = gl.getUniformLocation(prg.point, 'uVP');
    prg.pointColor = gl.getUniformLocation(prg.point, 'uColor');
    prg.pointSize = gl.getUniformLocation(prg.point, 'uSize');
    prg.pointPos = gl.getAttribLocation(prg.point, 'aPos');

    // Sprite program (mentor bot, labels)
    prg.sprite = makeProgram(gl, VS_SPRITE, FS_SPRITE);
    prg.spriteVP = gl.getUniformLocation(prg.sprite, 'uVP');
    prg.spriteColor = gl.getUniformLocation(prg.sprite, 'uColor');
    prg.spriteOffset = gl.getUniformLocation(prg.sprite, 'uOffset');
    prg.spriteScale = gl.getUniformLocation(prg.sprite, 'uScale');
    prg.spritePos = gl.getAttribLocation(prg.sprite, 'aPos');

    // Shared buffer
    prg.buf = gl.createBuffer();
    prg.ready = true;

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.enable(gl.DEPTH_TEST);
    gl.depthFunc(gl.LEQUAL);
}

// ── Draw helpers ──
function drawPoints(gl, vp, points, color, size){
    if(!points.length||!prg.ready) return;
    var data = new Float32Array(points.length * 3);
    for(var i=0;i<points.length;i++){
        data[i*3] = points[i].x;
        data[i*3+1] = points[i].y;
        data[i*3+2] = points[i].z;
    }
    gl.useProgram(prg.point);
    gl.uniformMatrix4fv(prg.pointVP, false, vp);
    gl.uniform4fv(prg.pointColor, color);
    gl.uniform1f(prg.pointSize, size);
    gl.bindBuffer(gl.ARRAY_BUFFER, prg.buf);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(prg.pointPos);
    gl.vertexAttribPointer(prg.pointPos, 3, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.POINTS, 0, points.length);
}

function drawLine(gl, vp, p1, p2, color, width){
    if(!prg.ready) return;
    var data = new Float32Array([p1.x,p1.y,p1.z, p2.x,p2.y,p2.z]);
    gl.useProgram(prg.line);
    gl.uniformMatrix4fv(prg.lineVP, false, vp);
    gl.uniform4fv(prg.lineColor, color);
    gl.lineWidth(width || 3);
    gl.bindBuffer(gl.ARRAY_BUFFER, prg.buf);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(prg.linePos);
    gl.vertexAttribPointer(prg.linePos, 3, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.LINES, 0, 2);
}

function drawLineStrip(gl, vp, points, color){
    if(!prg.ready || points.length < 2) return;
    var data = new Float32Array(points.length * 3);
    for(var i=0;i<points.length;i++){
        data[i*3]=points[i].x; data[i*3+1]=points[i].y; data[i*3+2]=points[i].z;
    }
    gl.useProgram(prg.line);
    gl.uniformMatrix4fv(prg.lineVP, false, vp);
    gl.uniform4fv(prg.lineColor, color);
    gl.lineWidth(2);
    gl.bindBuffer(gl.ARRAY_BUFFER, prg.buf);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(prg.linePos);
    gl.vertexAttribPointer(prg.linePos, 3, gl.FLOAT, false, 0, 0);
    gl.drawArrays(gl.LINE_STRIP, 0, points.length);
}

// Draw a small 3D cross marker at a point
function drawCross(gl, vp, p, color, size){
    var s = size || 0.03;
    drawLine(gl, vp, {x:p.x-s,y:p.y,z:p.z},{x:p.x+s,y:p.y,z:p.z}, color, 3);
    drawLine(gl, vp, {x:p.x,y:p.y-s,z:p.z},{x:p.x,y:p.y+s,z:p.z}, color, 3);
    drawLine(gl, vp, {x:p.x,y:p.y,z:p.z-s},{x:p.x,y:p.y,z:p.z+s}, color, 3);
}

// Draw mentor bot (diamond shape in 3D)
function drawMentor(gl, vp, pos){
    var s = 0.06;
    var top = {x:pos.x, y:pos.y+s*2, z:pos.z};
    var bot = {x:pos.x, y:pos.y-s, z:pos.z};
    var l = {x:pos.x-s, y:pos.y+s*0.5, z:pos.z};
    var r = {x:pos.x+s, y:pos.y+s*0.5, z:pos.z};
    var f = {x:pos.x, y:pos.y+s*0.5, z:pos.z-s};
    var b = {x:pos.x, y:pos.y+s*0.5, z:pos.z+s};
    var c = [0.2, 0.6, 1.0, 0.9]; // blue glow
    drawLine(gl, vp, top, l, c, 2);
    drawLine(gl, vp, top, r, c, 2);
    drawLine(gl, vp, top, f, c, 2);
    drawLine(gl, vp, top, b, c, 2);
    drawLine(gl, vp, bot, l, c, 2);
    drawLine(gl, vp, bot, r, c, 2);
    drawLine(gl, vp, bot, f, c, 2);
    drawLine(gl, vp, bot, b, c, 2);
    drawLine(gl, vp, l, f, c, 2);
    drawLine(gl, vp, f, r, c, 2);
    drawLine(gl, vp, r, b, c, 2);
    drawLine(gl, vp, b, l, c, 2);
    // Glow point at center
    drawPoints(gl, vp, [pos], [0.3, 0.7, 1.0, 1.0], 18.0);
    // Eye dots
    drawPoints(gl, vp, [
        {x:pos.x-0.015, y:pos.y+s*1.2, z:pos.z-s*0.8},
        {x:pos.x+0.015, y:pos.y+s*1.2, z:pos.z-s*0.8}
    ], [1.0, 1.0, 1.0, 1.0], 6.0);
}

// ═══ MATRIX MATH ═══
function matMul(a, b){
    var r = new Float32Array(16);
    for(var i=0;i<4;i++)for(var j=0;j<4;j++){
        r[i*4+j]=0;
        for(var k=0;k<4;k++) r[i*4+j]+=a[i*4+k]*b[k*4+j];
    }
    return r;
}

// ═══ CHECK XR ═══
var canXR = false;
if(navigator.xr){
    navigator.xr.isSessionSupported('immersive-ar').then(function(ok){
        canXR=ok;
        if(!ok)document.getElementById('noXR').style.display='block';
    });
} else { document.getElementById('noXR').style.display='block'; }

// ═══ START AR ═══
window.startAR = function(){
    if(!canXR){document.getElementById('noXR').style.display='block';return;}
    // dom-overlay tells Quest browser this is a spatial app, not a flat panel
    // requiredFeatures: local-floor ensures we get floor-relative tracking
    // unbounded in optional lets us walk past guardian boundary
    var domRoot = document.getElementById('launch');
    var sessionOpts = {
        requiredFeatures: ['local-floor'],
        optionalFeatures: ['unbounded','hit-test','anchors','plane-detection','mesh-detection','hand-tracking','dom-overlay'],
        domOverlay: { root: domRoot }
    };
    // If dom-overlay not supported, try without it
    navigator.xr.requestSession('immersive-ar', sessionOpts).catch(function(){
        delete sessionOpts.domOverlay;
        sessionOpts.optionalFeatures = sessionOpts.optionalFeatures.filter(function(f){return f!=='dom-overlay';});
        return navigator.xr.requestSession('immersive-ar', sessionOpts);
    }).then(function(session){
        xr.session=session;
        document.getElementById('launch').style.display='none';
        xr.canvas=document.createElement('canvas');
        xr.gl=xr.canvas.getContext('webgl2',{xrCompatible:true});
        if(!xr.gl)xr.gl=xr.canvas.getContext('webgl',{xrCompatible:true});
        session.updateRenderState({baseLayer:new XRWebGLLayer(session,xr.gl)});
        initGL(xr.gl);
        // Try unbounded FIRST — this is what removes the guardian boundary
        // Quest 3 supports this and it allows full room-scale walkabout
        var spaces=['unbounded','local-floor','local','viewer'];
        (function tryS(i){
            if(i>=spaces.length){
                say('Could not get reference space. Try disabling guardian in Quest settings.','e','c');
                console.error('[Scanner] All ref spaces failed');
                return;
            }
            console.log('[Scanner] Trying ref space:', spaces[i]);
            session.requestReferenceSpace(spaces[i]).then(function(rs){
                xr.ref=rs;
                console.log('[Scanner] Got ref space:', spaces[i]);
                say('Scanner active. ' + (spaces[i]==='unbounded' ? 'Full room access. ' : '') + 'Walk to a wall. Point at it. Tap to mark the corner.','s','h');
                mentor.visible = true; // Bot visible immediately
                setup(session,rs);
            }).catch(function(err){
                console.warn('[Scanner] Ref space', spaces[i], 'failed:', err.message || err);
                tryS(i+1);
            });
        })(0);
        session.addEventListener('end',function(){
            xr.session=null;xr.hitSrc=null;xr.pending=null;xr.samples=[];xr.anchors=[];
            hands.left=[];hands.right=[];hands.trails=[];
            document.getElementById('launch').style.display='flex';
            if(M.length>0){say(M.length+' measurements saved.','end','h');setTimeout(openResults,1000);}
        });
        recover();
    }).catch(function(err){
        say('AR failed. '+err.message,'e','c');
        document.getElementById('noXR').style.display='block';
        document.getElementById('noXR').textContent='AR failed: '+err.message;
    });
};

// ═══ SESSION SETUP ═══
function setup(session, ref){
    // Hit-test
    session.requestReferenceSpace('viewer').then(function(vs){
        session.requestHitTestSource({space:vs}).then(function(s){xr.hitSrc=s;}).catch(function(){});
    }).catch(function(){});
    session.addEventListener('inputsourceschange',function(){
        if(!xr.hitSrc){
            var srcs=Array.from(session.inputSources);
            for(var i=0;i<srcs.length;i++){
                if(srcs[i].targetRaySpace){
                    session.requestHitTestSource({space:srcs[i].targetRaySpace}).then(function(h){xr.hitSrc=h;}).catch(function(){});
                    break;
                }
            }
        }
    });

    // ── TAP ──
    session.addEventListener('select',function(e){
        var frame=e.frame, hp=null, hu=false;
        if(xr.hitSrc){
            var r=frame.getHitTestResults(xr.hitSrc);
            if(r.length>0){var p=r[0].getPose(ref);if(p){hp={x:p.transform.position.x,y:p.transform.position.y,z:p.transform.position.z};hu=true;}}
        }
        if(!hp){
            var rp=frame.getPose(e.inputSource.targetRaySpace,ref);
            if(rp){var pp=rp.transform.position,oo=rp.transform.orientation;
                var fx=2*(oo.x*oo.z+oo.w*oo.y),fy=2*(oo.y*oo.z-oo.w*oo.x),fz=1-2*(oo.x*oo.x+oo.y*oo.y);
                hp={x:pp.x+fx*1.5,y:pp.y+fy*1.5,z:pp.z+fz*1.5};
            }
        }
        if(!hp){say('No surface. Move closer to the wall.','ns','c');return;}
        try{if(e.inputSource.gamepad&&e.inputSource.gamepad.hapticActuators)e.inputSource.gamepad.hapticActuators[0].pulse(0.7,80);}catch(he){}

        // 8-sample smoothing
        if(xr.samples.length>=xr.sampleN){
            var avg={x:0,y:0,z:0};
            xr.samples.forEach(function(s){avg.x+=s.x;avg.y+=s.y;avg.z+=s.z;});
            avg.x/=xr.samples.length;avg.y/=xr.samples.length;avg.z/=xr.samples.length;
            // 60% tap, 40% average — stronger smoothing than before
            hp.x=hp.x*0.6+avg.x*0.4;
            hp.y=hp.y*0.6+avg.y*0.4;
            hp.z=hp.z*0.6+avg.z*0.4;
        }
        xr.samples=[];

        // Snap to detected plane if close
        // (uses the hit-test result which already snaps to geometry)

        placePoint(hp, hu);
    });

    // ── RENDER LOOP ──
    var t0=Date.now(), nudged=false, fc=0;
    function onFrame(time,frame){
        session.requestAnimationFrame(onFrame);
        fc++;
        var gl=xr.gl, pose=frame.getViewerPose(ref);
        if(!pose)return;
        var layer=session.renderState.baseLayer;
        gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
        gl.clearColor(0,0,0,0);
        gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

        // Process each view (one per eye on Quest 3)
        for(var vi=0;vi<pose.views.length;vi++){
            var view=pose.views[vi];
            var vp=layer.getViewport(view);
            gl.viewport(vp.x, vp.y, vp.width, vp.height);

            // View-projection matrix
            var vpMat=matMul(view.projectionMatrix, view.transform.inverse.matrix);

            // ── Draw all placed anchors (glowing markers) ──
            var anchorColor = [1.0, 0.5, 0.0, 1.0]; // orange
            var anchorGlow = [1.0, 0.5, 0.0, 0.4];
            xr.anchors.forEach(function(a){
                drawPoints(gl, vpMat, [a], anchorColor, 16.0); // solid center
                drawPoints(gl, vpMat, [a], anchorGlow, 32.0);  // glow ring
                drawCross(gl, vpMat, a, [1.0, 0.6, 0.1, 0.7], 0.04); // 3D cross
            });

            // ── Draw completed measurement lines ──
            M.forEach(function(m){
                var c = m.confidence >= 80 ? [0.18,0.8,0.44,1.0] : m.confidence >= 50 ? [0.95,0.77,0.06,1.0] : [0.91,0.3,0.24,1.0];
                drawLine(gl, vpMat, m.p1, m.p2, c, 4);
                // Midpoint marker
                var mp={x:(m.p1.x+m.p2.x)/2, y:(m.p1.y+m.p2.y)/2+0.05, z:(m.p1.z+m.p2.z)/2};
                drawPoints(gl, vpMat, [mp], [1.0,1.0,1.0,0.9], 10.0);
            });

            // ── Draw pending line (first point to current aim) ──
            if(xr.pending && xr.lastHit){
                drawLine(gl, vpMat, xr.pending, xr.lastHit, [0.29,0.86,0.5,0.6], 2);
                // Pulsing endpoint
                var pulse = 0.5 + Math.sin(time * 0.005) * 0.3;
                drawPoints(gl, vpMat, [xr.lastHit], [0.29,0.86,0.5,pulse], 20.0);
            }

            // ── Draw hand joints + trails ──
            var handJointColor = [0.6, 0.4, 1.0, 0.8]; // purple
            if(hands.left.length > 0) drawPoints(gl, vpMat, hands.left, handJointColor, 6.0);
            if(hands.right.length > 0) drawPoints(gl, vpMat, hands.right, handJointColor, 6.0);
            // Fingertip trails
            hands.trails.forEach(function(trail){
                if(trail.length > 1) drawLineStrip(gl, vpMat, trail, [0.6, 0.4, 1.0, 0.3]);
            });

            // ── Draw mentor bot ──
            if(mentor.visible){
                drawMentor(gl, vpMat, mentor.pos);
            }

            // ── Draw hit-test reticle ──
            if(xr.lastHit && !xr.pending){
                drawPoints(gl, vpMat, [xr.lastHit], [0.29,0.86,0.5,0.5], 14.0);
                drawCross(gl, vpMat, xr.lastHit, [0.29,0.86,0.5,0.3], 0.02);
            }
        }

        // ── Hit-test tracking ──
        if(xr.hitSrc){
            var hr=frame.getHitTestResults(xr.hitSrc);
            if(hr.length>0){var hp2=hr[0].getPose(ref);if(hp2){
                xr.lastHit={x:hp2.transform.position.x,y:hp2.transform.position.y,z:hp2.transform.position.z};
                xr.samples.push(xr.lastHit);
                if(xr.samples.length>xr.sampleN*3)xr.samples.shift();
            }}
        }

        // ── Hand tracking ──
        var srcs=session.inputSources;
        var leftJ=[], rightJ=[], indexTips=[];
        for(var si=0;si<srcs.length;si++){
            var src=srcs[si];
            if(src.hand){
                var joints=[];
                for(var ji=0;ji<25;ji++){
                    var jname=jointName(ji);
                    var joint=src.hand.get(jname);
                    if(joint){
                        try{
                            var jp=frame.getJointPose(joint,ref);
                            if(jp)joints.push({x:jp.transform.position.x,y:jp.transform.position.y,z:jp.transform.position.z});
                        }catch(e){}
                    }
                }
                if(src.handedness==='left')leftJ=joints; else rightJ=joints;
                // Index fingertip trail (joint 8 = index tip)
                if(joints.length>8){
                    indexTips.push(joints[8]);
                }
            }
        }
        hands.left=leftJ; hands.right=rightJ;
        // Update trails
        if(indexTips.length>0){
            indexTips.forEach(function(tip,idx){
                if(!hands.trails[idx])hands.trails[idx]=[];
                hands.trails[idx].push(tip);
                if(hands.trails[idx].length>TRAIL_LEN)hands.trails[idx].shift();
            });
        }

        // ── Plane detection ──
        if(frame.detectedPlanes&&fc%30===0){
            var ct=frame.detectedPlanes.size||0;
            if(ct!==xr.planes){
                xr.planes=ct;
                var w=0,f=0,c=0;
                frame.detectedPlanes.forEach(function(pl){
                    if(pl.orientation==='vertical')w++;
                    else{var pp2=frame.getPose?frame.getPose(pl.planeSpace,ref):null;
                        if(pp2&&pose.views[0]){if(pp2.transform.position.y>pose.views[0].transform.position.y-.3)c++;else f++;}else f++;}
                });
                xr.planeInfo={w:w,f:f,c:c};
                if(ct===1)say('Surface found. Look around slowly.','sf');
                else if(ct>=3&&xr.planes<3)say(ct+' surfaces. '+w+' walls. Ready to measure.','sf');
            }
        }

        // ── Update mentor bot position (follows viewer, offset to right) ──
        if(pose.views[0]){
            var vt=pose.views[0].transform;
            var vp2=vt.position;
            var vo=vt.orientation;
            // Right-side offset from viewer gaze
            var rx=1-2*(vo.y*vo.y+vo.z*vo.z), rz=2*(vo.x*vo.z-vo.w*vo.y);
            mentor.targetPos={x:vp2.x+rx*0.6, y:vp2.y-0.2, z:vp2.z+rz*0.6};
            // Smooth follow
            mentor.pos.x+=(mentor.targetPos.x-mentor.pos.x)*0.05;
            mentor.pos.y+=(mentor.targetPos.y-mentor.pos.y)*0.05;
            mentor.pos.z+=(mentor.targetPos.z-mentor.pos.z)*0.05;
            mentor.visible=true; // Always visible — your companion from frame 1
        }

        // ── Proactive nudges ──
        if(!nudged&&(Date.now()-t0)>20000&&M.length===0){
            nudged=true;
            say('Walk up to a wall corner. Point at it. Tap to mark it. Then walk to the next corner and tap again.','nudge');
        }
    }
    session.requestAnimationFrame(onFrame);
}

// ═══ PLACE POINT ═══
function placePoint(pos, hitUsed){
    // Add visible anchor
    xr.anchors.push({x:pos.x, y:pos.y, z:pos.z});

    if(!xr.pending){
        xr.pending={x:pos.x,y:pos.y,z:pos.z};
        say('Corner marked. Now walk to the other end of this wall and tap.','pt');
    } else {
        var dx=pos.x-xr.pending.x, dy=pos.y-xr.pending.y, dz=pos.z-xr.pending.z;
        var dm=Math.sqrt(dx*dx+dy*dy+dz*dz);
        var di=dm*39.3701;
        var fi=Math.sqrt(dx*dx+dz*dz)*39.3701;
        var useF=Math.abs(dy)<0.3;
        var final_d=useF?fi:di;
        var c=conf(hitUsed,dm,dy);
        mid++;
        var label='Wall '+mid;
        M.push({id:mid,label:label,distance:final_d,confidence:c,ts:Date.now(),
            p1:{x:xr.pending.x,y:xr.pending.y,z:xr.pending.z},
            p2:{x:pos.x,y:pos.y,z:pos.z},
            dist3d:di,distFloor:fi
        });
        xr.pending=null;
        save();

        var ft=(final_d/12).toFixed(1);
        if(c<50){
            say(label+'. '+ft+' feet. Low confidence. Try getting closer to the wall.','ms','c');
        } else if(c<75){
            say(ft+' feet. '+c+' percent confidence.','ms');
        } else {
            say(ft+' feet. Solid.','ms');
        }
    }
}

// Joint name lookup
function jointName(i){
    var n=['wrist','thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
    'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
    'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
    'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
    'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip'];
    return n[i]||'wrist';
}

// ═══ RESULTS ═══
window.openResults=function(){document.getElementById('results').classList.add('open');renderRes();};
window.closeResults=function(){document.getElementById('results').classList.remove('open');};
function renderRes(){
    var list=document.getElementById('rlist'), sum=document.getElementById('rsum');
    if(!M.length){list.innerHTML='<p style="color:#7f8c8d;text-align:center;padding:30px">No measurements yet.</p>';sum.innerHTML='';return;}
    var tl=0; M.forEach(function(m){tl+=m.distance/12;});
    var sorted=M.map(function(m){return m.distance/12;}).sort(function(a,b){return b-a;});
    var area=sorted.length>=2?sorted[0]*sorted[1]:0;
    var ac=0;M.forEach(function(m){ac+=m.confidence;});ac=Math.round(ac/M.length);
    var sh='<div class="sr"><span class="sl">Walls</span><span class="sv">'+M.length+'</span></div>';
    sh+='<div class="sr"><span class="sl">Perimeter</span><span class="sv">'+tl.toFixed(1)+' ft</span></div>';
    if(area>0)sh+='<div class="sr"><span class="sl">Est. area</span><span class="sv">'+area.toFixed(0)+' sq ft</span></div>';
    sh+='<div class="sr"><span class="sl">Avg confidence</span><span class="sv">'+ac+'%</span></div>';
    sum.innerHTML=sh;
    var h='';M.forEach(function(m){
        var cc=m.confidence>=80?'rc-h':m.confidence>=50?'rc-m':'rc-l';
        h+='<div class="rcard"><div class="rl">WALL</div><div class="rv">'+fmt(m.distance)+'</div>';
        h+='<div class="rd">'+m.label+' — '+fmtFt(m.distance)+'</div>';
        h+='<span class="rc '+cc+'">'+m.confidence+'%</span></div>';
    });
    list.innerHTML=h;
}

// ═══ EXPORTS ═══
function getTxt(){
    var l=['Room Scanner — Watts Safety Installs',''];
    M.forEach(function(m){l.push(m.label+': '+fmt(m.distance)+' ('+fmtFt(m.distance)+') ['+m.confidence+'%]');});
    var t=0;M.forEach(function(m){t+=m.distance/12;});
    l.push('');l.push('Total: '+M.length+' walls, '+t.toFixed(1)+' ft');
    return l.join('\n');
}
window.copyAll=function(){if(navigator.clipboard)navigator.clipboard.writeText(getTxt()).then(function(){say('Copied.','cp');});};
window.fieldReport=function(){
    var l=['WATTS SAFETY INSTALLS — FIELD REPORT','Date: '+new Date().toLocaleString(),'Scanner: Room Scanner v5',''];
    var t=0;M.forEach(function(m){t+=m.distance/12;l.push(m.label+': '+fmt(m.distance)+' ('+fmtFt(m.distance)+')');});
    l.push('');l.push('Total: '+M.length+' walls, '+t.toFixed(1)+' ft');
    if(navigator.clipboard)navigator.clipboard.writeText(l.join('\n')).then(function(){say('Field report copied.','cp');});
};
window.sendBidGen=function(){
    var t=getTxt();
    if(window.opener){window.opener.postMessage({type:'roomScannerData',measurements:t,photo:snap},'*');say('Sent.','sd');}
    else{try{sessionStorage.setItem('roomScannerData',JSON.stringify({measurements:t,photo:snap}));}catch(e){}
    try{localStorage.setItem('roomScannerData',JSON.stringify({measurements:t,photo:snap}));}catch(e){}
    window.location.href='index.html#fieldcalc';}
};
window.aiAnalysis=function(){
    if(!M.length){say('No measurements.','ai');return;}
    say('Sending to AI...','ai');
    var t=getTxt();
    var pr='You are a master general contractor. Measurements:\n'+t+'\n\nProvide: 1) Assessment 2) Material Takeoff 3) Labor Estimate 4) Scope 5) Recommendations. Use the numbers. Bold all numbers.';
    fetch('https://watts-ai-proxy.wattssafetyinstalls.workers.dev?model=gemini-2.5-pro',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{role:'user',parts:[{text:pr}]}],generationConfig:{maxOutputTokens:16384,temperature:0.3}})
    }).then(function(r){return r.json();}).then(function(d){
        var ai='';try{ai=d.candidates[0].content.parts[0].text;}catch(e){ai='Error';}
        document.getElementById('rlist').innerHTML+='<div class="rcard" style="border-color:#3498db"><div class="rl" style="color:#3498db">AI ANALYSIS</div><div style="font-size:12px;line-height:1.5;color:#bdc3c7;margin-top:6px;white-space:pre-wrap">'+ai.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#ecf0f1">$1</strong>').replace(/\n/g,'<br>')+'</div></div>';
        say('Analysis complete.','ai');
    }).catch(function(e){say('AI error.','ai','c');});
};
