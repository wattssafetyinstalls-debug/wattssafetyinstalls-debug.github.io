<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Room Scanner — Watts Safety Installs</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; overflow: hidden; touch-action: none; }

        /* ── Launch Screen (shown before AR) ── */
        #launchScreen {
            position: fixed; inset: 0; z-index: 500;
            background: linear-gradient(135deg, #0a1628 0%, #1a1a2e 50%, #0d1b2a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 24px; text-align: center;
        }
        #launchScreen h1 { font-size: 32px; font-weight: 800; color: #e67e22; margin-bottom: 8px; }
        #launchScreen .sub { font-size: 14px; color: #7f8c8d; margin-bottom: 40px; }
        #enterAR {
            width: 280px; height: 280px; border-radius: 50%; border: 4px solid #e67e22;
            background: rgba(230,126,34,0.15); color: #e67e22;
            font-size: 24px; font-weight: 800; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; transition: all 0.3s;
        }
        #enterAR:hover, #enterAR:active { background: rgba(230,126,34,0.3); transform: scale(1.05); }
        #enterAR .big-icon { font-size: 64px; }
        #enterAR .hint { font-size: 12px; color: #95a5a6; font-weight: 400; margin-top: 4px; }
        #noXRMsg { display: none; margin-top: 24px; padding: 16px 24px; background: #1a2744; border: 1px solid #e74c3c; border-radius: 12px; max-width: 360px; }
        #noXRMsg p { font-size: 13px; color: #e74c3c; line-height: 1.5; }
        #fallbackBtns { margin-top: 20px; display: none; gap: 12px; }
        #fallbackBtns button { padding: 16px 28px; border-radius: 12px; border: 2px solid #2a3a5c; background: #16213e; color: #ecf0f1; font-size: 15px; font-weight: 600; cursor: pointer; }

        /* ── AR HUD (in-session overlay) ── */
        #arHUD { position: fixed; inset: 0; z-index: 100; display: none; pointer-events: none; }

        /* Live distance — big, centered, always visible when measuring */
        #liveDist {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); border: 3px solid #4ade80;
            border-radius: 20px; padding: 14px 32px;
            font-size: 42px; font-weight: 800; color: #4ade80;
            font-variant-numeric: tabular-nums; text-align: center;
            min-width: 240px; display: none;
            pointer-events: none;
        }
        #liveDist .unit { font-size: 18px; color: #95a5a6; font-weight: 400; display: block; margin-top: 2px; }

        /* Status message — top center */
        #arStatus {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); border-radius: 12px; padding: 8px 20px;
            font-size: 16px; color: #ecf0f1; font-weight: 500;
            pointer-events: none; white-space: nowrap;
        }

        /* Bottom action bar — BIG buttons for VR hand/controller tap */
        #actionBar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; pointer-events: auto;
        }
        .ar-btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6);
            color: white; font-size: 28px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px); transition: all 0.15s;
        }
        .ar-btn:hover, .ar-btn:active { background: rgba(230,126,34,0.5); border-color: #e67e22; transform: scale(1.1); }
        .ar-btn.active-tool { background: rgba(230,126,34,0.4); border-color: #e67e22; }
        .ar-btn .label { position: absolute; bottom: -18px; font-size: 10px; color: #aaa; white-space: nowrap; font-weight: 600; }

        /* Measurement counter pill */
        #measureCount {
            position: fixed; top: 16px; right: 20px;
            background: rgba(0,0,0,0.6); border-radius: 20px; padding: 6px 16px;
            font-size: 14px; color: #e67e22; font-weight: 700;
            pointer-events: auto; cursor: pointer;
        }

        /* Surface count indicator */
        #surfaceCount {
            position: fixed; top: 16px; left: 20px;
            background: rgba(0,0,0,0.6); border-radius: 20px; padding: 6px 16px;
            font-size: 13px; color: #4ade80; font-weight: 600;
            pointer-events: none;
        }

        /* Speech bubble from scout */
        #scoutBubble {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(52,152,219,0.9); color: white;
            font-size: 15px; font-weight: 600; padding: 12px 20px;
            border-radius: 16px; max-width: 400px; text-align: center;
            pointer-events: none; display: none; line-height: 1.4;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        #scoutBubble.visible { display: block; animation: bubbleIn 0.25s ease-out; }
        @keyframes bubbleIn { from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

        /* Results panel — full screen overlay when tapped */
        #resultsPanel {
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px); overflow-y: auto; padding: 24px;
            display: none;
        }
        #resultsPanel.open { display: block; }
        #resultsPanel h2 { font-size: 22px; color: #e67e22; margin-bottom: 16px; }
        #resultsPanel .close-btn {
            position: fixed; top: 20px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(231,76,60,0.3); border: 2px solid #e74c3c;
            color: white; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .result-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px 18px; margin-bottom: 10px;
        }
        .result-card .rc-label { font-size: 11px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .result-card .rc-value { font-size: 28px; font-weight: 800; color: #e67e22; margin-top: 2px; }
        .result-card .rc-detail { font-size: 12px; color: #95a5a6; margin-top: 4px; }
        .result-card .rc-conf { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; }
        .rc-conf-high { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .rc-conf-med { background: rgba(241,196,15,0.2); color: #f1c40f; }
        .rc-conf-low { background: rgba(231,76,60,0.2); color: #e74c3c; }
        #resultsSummary { background: rgba(230,126,34,0.1); border: 1px solid #e67e22; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        #resultsSummary .sum-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
        #resultsSummary .sum-row .sl { color: #95a5a6; }
        #resultsSummary .sum-row .sv { color: #ecf0f1; font-weight: 700; }
        .results-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .results-actions button {
            flex: 1; min-width: 140px; padding: 16px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .ra-primary { background: #e67e22; color: white; }
        .ra-secondary { background: rgba(255,255,255,0.1); color: #ecf0f1; border: 1px solid rgba(255,255,255,0.2) !important; }
    </style>
</head>
<body>

<!-- ═══ LAUNCH SCREEN ═══ -->
<div id="launchScreen">
    <h1>📐 Room Scanner</h1>
    <div class="sub">Watts Safety Installs — Spatial Measurement Tool</div>
    <button id="enterAR" onclick="launchAR()">
        <span class="big-icon">🥽</span>
        ENTER AR
        <span class="hint">Tap to start scanning your room</span>
    </button>
    <div id="noXRMsg">
        <p>WebXR AR is not available on this device. Use this tool on a Meta Quest 3 for the full spatial experience.</p>
    </div>
    <div id="fallbackBtns">
        <button onclick="launchCamera()">📸 Camera Mode</button>
        <button onclick="launch2D()">📐 2D Sketch</button>
    </div>
</div>

<!-- ═══ AR HUD (visible during immersive session) ═══ -->
<div id="arHUD">
    <div id="arStatus">Looking for surfaces...</div>
    <div id="surfaceCount">0 surfaces</div>
    <div id="liveDist"><span id="liveDistVal">0' 0"</span><span class="unit" id="liveDistUnit">measuring...</span></div>
    <div id="measureCount" onclick="openResults()">0 measurements</div>
    <div id="actionBar">
        <button class="ar-btn active-tool" id="abMeasure" onclick="setARTool('measure')">📏</button>
        <button class="ar-btn" id="abUndo" onclick="arUndo()">↩️</button>
        <button class="ar-btn" id="abDone" onclick="openResults()">✅</button>
        <button class="ar-btn" id="abMute" onclick="toggleMute()">🔊</button>
    </div>
    <div id="scoutBubble"></div>
</div>

<!-- ═══ RESULTS PANEL ═══ -->
<div id="resultsPanel">
    <button class="close-btn" onclick="closeResults()">✕</button>
    <h2>📏 Measurements</h2>
    <div id="resultsSummary"></div>
    <div id="resultsList"></div>
    <div class="results-actions">
        <button class="ra-primary" onclick="sendToBidGen()">📤 Send to BidGen</button>
        <button class="ra-secondary" onclick="exportFieldReport()">📄 Field Report</button>
        <button class="ra-secondary" onclick="copyAll()">📋 Copy All</button>
        <button class="ra-secondary" onclick="sendToAI()">🧠 AI Analysis</button>
        <button class="ra-secondary" onclick="closeResults()">← Back to AR</button>
    </div>
</div>

<script>
(function(){
'use strict';

// ═══════════════════════════════════════════════════════════
// ROOM SCANNER v4 — Quest 3 Spatial-First Architecture
//
// Design principles:
// 1. AR-first: launch straight into immersive passthrough
// 2. Voice-first: Scout talks, minimal visual UI
// 3. Giant touch targets: sized for VR hand/controller
// 4. Zero clutter: only show what matters RIGHT NOW
// 5. Auto-everything: auto-label, auto-save, auto-detect
// ═══════════════════════════════════════════════════════════

// ── State ──
var measurements = [];
var measureId = 0;
var arTool = 'measure';
var snapshotBase64 = null;

// ── DOM refs ──
var launchScreen = document.getElementById('launchScreen');
var arHUD = document.getElementById('arHUD');
var liveDist = document.getElementById('liveDist');
var arStatus = document.getElementById('arStatus');
var surfaceCountEl = document.getElementById('surfaceCount');
var measureCountEl = document.getElementById('measureCount');
var scoutBubble = document.getElementById('scoutBubble');
var resultsPanel = document.getElementById('resultsPanel');

// ── XR State ──
var _xr = {
    session: null, refSpace: null, gl: null, glCanvas: null,
    hitTestSource: null, lastHitPose: null,
    pending3D: null, hitSamples: [], sampleCount: 5,
    planesDetected: 0, planeTypes: {}
};

// ═══ SCOUT VOICE ═══
var _scout = {
    muted: false, speaking: false, voice: null, initialized: false,
    cooldowns: {}, cooldownMs: 4000
};

function initVoice() {
    if (_scout.initialized || !window.speechSynthesis) return;
    _scout.initialized = true;
    function pick() {
        var v = speechSynthesis.getVoices();
        if (!v.length) return;
        var prefs = ['google us english','microsoft mark','microsoft david','samantha','alex'];
        for (var p = 0; p < prefs.length; p++)
            for (var i = 0; i < v.length; i++)
                if (v[i].name.toLowerCase().indexOf(prefs[p]) >= 0) { _scout.voice = v[i]; return; }
        for (var j = 0; j < v.length; j++)
            if (v[j].lang && v[j].lang.indexOf('en') === 0) { _scout.voice = v[j]; return; }
        _scout.voice = v[0];
    }
    pick();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = pick;
}
initVoice();

function say(text, cat, priority) {
    if (_scout.muted || !window.speechSynthesis || !text) return;
    cat = cat || 'gen';
    priority = priority || 'normal';
    var now = Date.now();
    if (_scout.cooldowns[cat] && (now - _scout.cooldowns[cat]) < _scout.cooldownMs && priority !== 'critical') return;
    _scout.cooldowns[cat] = now;

    if (priority === 'critical' && speechSynthesis.speaking) speechSynthesis.cancel();

    var u = new SpeechSynthesisUtterance(text);
    if (_scout.voice) u.voice = _scout.voice;
    u.rate = 1.1; u.pitch = 1.0; u.volume = 0.9;

    u.onstart = function() {
        _scout.speaking = true;
        showBubble(text);
    };
    u.onend = function() {
        _scout.speaking = false;
        setTimeout(hideBubble, 1200);
    };
    u.onerror = function() { _scout.speaking = false; };

    speechSynthesis.speak(u);
}

function showBubble(text) {
    scoutBubble.textContent = text;
    scoutBubble.classList.add('visible');
}
function hideBubble() {
    scoutBubble.classList.remove('visible');
}

window.toggleMute = function() {
    _scout.muted = !_scout.muted;
    document.getElementById('abMute').textContent = _scout.muted ? '🔇' : '🔊';
    if (_scout.muted && speechSynthesis.speaking) speechSynthesis.cancel();
    if (!_scout.muted) say('Voice on.', 'mute');
};

// ═══ FORMAT HELPERS ═══
function fmtDist(inches) {
    if (!inches || inches <= 0) return "0'";
    var ft = Math.floor(inches / 12);
    var inc = Math.round(inches % 12);
    if (inc === 12) { ft++; inc = 0; }
    return ft + "'" + (inc > 0 ? ' ' + inc + '"' : '');
}
function fmtFt(inches) { return (inches / 12).toFixed(2) + ' ft'; }

function calcConf(hitUsed, distM, dy) {
    var s = 100;
    if (!hitUsed) s -= 35;
    if (distM > 8) s -= 15;
    if (distM > 15) s -= 15;
    if (Math.abs(dy) > 0.5) s -= 10;
    if (distM < 0.1) s -= 40;
    return Math.max(10, Math.min(100, s));
}

// ═══ AUTO-SAVE ═══
var SAVE_KEY = 'roomScanner_v4';
function autoSave() {
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
            measurements: measurements, measureId: measureId, ts: Date.now()
        }));
    } catch(e) {}
}
function autoRecover() {
    try {
        var d = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (d && d.measurements && d.measurements.length && (Date.now() - d.ts) < 86400000) {
            measurements = d.measurements;
            measureId = d.measureId || 0;
            updateCount();
            say('Recovered ' + measurements.length + ' measurements from your last session.', 'recover', 'high');
        }
    } catch(e) {}
}

function updateCount() {
    measureCountEl.textContent = measurements.length + ' measurement' + (measurements.length !== 1 ? 's' : '');
}

// ═══ CHECK XR SUPPORT ═══
var xrSupported = false;
if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(function(ok) {
        xrSupported = ok;
        if (!ok) showFallback();
    });
} else {
    showFallback();
}

function showFallback() {
    document.getElementById('noXRMsg').style.display = 'block';
    document.getElementById('fallbackBtns').style.display = 'flex';
}

// ═══ LAUNCH AR ═══
window.launchAR = function() {
    if (!xrSupported) {
        showFallback();
        return;
    }
    navigator.xr.requestSession('immersive-ar', {
        optionalFeatures: ['local-floor','unbounded','hit-test','anchors','plane-detection','mesh-detection','hand-tracking']
    }).then(function(session) {
        _xr.session = session;
        launchScreen.style.display = 'none';
        arHUD.style.display = 'block';

        _xr.glCanvas = document.createElement('canvas');
        _xr.gl = _xr.glCanvas.getContext('webgl2', { xrCompatible: true });
        if (!_xr.gl) _xr.gl = _xr.glCanvas.getContext('webgl', { xrCompatible: true });
        session.updateRenderState({ baseLayer: new XRWebGLLayer(session, _xr.gl) });

        var spaces = ['unbounded','local-floor','local'];
        (function trySpace(i) {
            if (i >= spaces.length) { say('Could not find a reference space. Try restarting.','err','critical'); return; }
            session.requestReferenceSpace(spaces[i]).then(function(rs) {
                _xr.refSpace = rs;
                say('Scanner ready. Point at a wall and tap to start measuring.', 'session', 'high');
                arStatus.textContent = 'Point at a wall and tap';
                setupSession(session, rs);
            }).catch(function() { trySpace(i+1); });
        })(0);

        session.addEventListener('end', function() {
            _xr.session = null; _xr.hitTestSource = null;
            _xr.pending3D = null; _xr.hitSamples = [];
            arHUD.style.display = 'none';
            liveDist.style.display = 'none';
            launchScreen.style.display = 'flex';
            var n = measurements.length;
            if (n > 0) {
                say(n + ' measurements saved. Opening results.', 'end', 'high');
                setTimeout(openResults, 1500);
            }
        });

        autoRecover();

    }).catch(function(err) {
        say('Failed to start AR. ' + err.message, 'err', 'critical');
        arStatus.textContent = 'AR failed: ' + err.message;
        showFallback();
    });
};

// ═══ SETUP XR SESSION ═══
function setupSession(session, refSpace) {
    // Hit-test from viewer gaze
    session.requestReferenceSpace('viewer').then(function(vs) {
        session.requestHitTestSource({ space: vs }).then(function(src) {
            _xr.hitTestSource = src;
        }).catch(function(){});
    }).catch(function(){});

    // Controller hit-test fallback
    session.addEventListener('inputsourceschange', function() {
        if (!_xr.hitTestSource) {
            var sources = Array.from(session.inputSources);
            if (sources.length > 0 && sources[0].targetRaySpace) {
                session.requestHitTestSource({ space: sources[0].targetRaySpace }).then(function(hts) {
                    _xr.hitTestSource = hts;
                }).catch(function(){});
            }
        }
    });

    // ── TAP = PLACE POINT ──
    session.addEventListener('select', function(e) {
        var frame = e.frame;
        var hitPoint = null, hitUsed = false;

        if (_xr.hitTestSource) {
            var results = frame.getHitTestResults(_xr.hitTestSource);
            if (results.length > 0) {
                var pose = results[0].getPose(refSpace);
                if (pose) {
                    hitPoint = { x: pose.transform.position.x, y: pose.transform.position.y, z: pose.transform.position.z };
                    hitUsed = true;
                }
            }
        }
        if (!hitPoint) {
            var rp = frame.getPose(e.inputSource.targetRaySpace, refSpace);
            if (rp) {
                var p = rp.transform.position, o = rp.transform.orientation;
                var fx = 2*(o.x*o.z + o.w*o.y), fy = 2*(o.y*o.z - o.w*o.x), fz = 1-2*(o.x*o.x + o.y*o.y);
                hitPoint = { x: p.x+fx*1.5, y: p.y+fy*1.5, z: p.z+fz*1.5 };
            }
        }
        if (!hitPoint) {
            say('No surface found. Move closer and point at a wall.', 'nosurf', 'critical');
            arStatus.textContent = 'No surface — move closer';
            return;
        }

        // Haptic
        try { if (e.inputSource.gamepad && e.inputSource.gamepad.hapticActuators) e.inputSource.gamepad.hapticActuators[0].pulse(0.6, 60); } catch(he){}

        // Smoothing
        if (_xr.hitSamples.length >= _xr.sampleCount) {
            var avg = {x:0,y:0,z:0};
            _xr.hitSamples.forEach(function(s){avg.x+=s.x;avg.y+=s.y;avg.z+=s.z;});
            avg.x/=_xr.hitSamples.length; avg.y/=_xr.hitSamples.length; avg.z/=_xr.hitSamples.length;
            hitPoint.x = hitPoint.x*0.7 + avg.x*0.3;
            hitPoint.y = hitPoint.y*0.7 + avg.y*0.3;
            hitPoint.z = hitPoint.z*0.7 + avg.z*0.3;
        }
        _xr.hitSamples = [];

        placePoint(hitPoint, hitUsed);
    });

    // ── RENDER LOOP ──
    var _frameCount = 0;
    var _sessionStart = Date.now();
    var _nudged = false;

    function onFrame(time, frame) {
        session.requestAnimationFrame(onFrame);
        _frameCount++;
        var gl = _xr.gl;
        var pose = frame.getViewerPose(refSpace);
        if (!pose) return;

        gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);
        gl.clearColor(0,0,0,0);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        // Hit-test tracking
        if (_xr.hitTestSource) {
            var results = frame.getHitTestResults(_xr.hitTestSource);
            if (results.length > 0) {
                var hp = results[0].getPose(refSpace);
                if (hp) {
                    var pos = { x: hp.transform.position.x, y: hp.transform.position.y, z: hp.transform.position.z };
                    _xr.lastHitPose = pos;
                    _xr.hitSamples.push(pos);
                    if (_xr.hitSamples.length > _xr.sampleCount * 2) _xr.hitSamples.shift();

                    // Live distance while measuring
                    if (_xr.pending3D) {
                        var dx = pos.x - _xr.pending3D.x, dy = pos.y - _xr.pending3D.y, dz = pos.z - _xr.pending3D.z;
                        var floorIn = Math.sqrt(dx*dx + dz*dz) * 39.3701;
                        var fullIn = Math.sqrt(dx*dx + dy*dy + dz*dz) * 39.3701;
                        var show = Math.abs(dy) < 0.3 ? floorIn : fullIn;
                        document.getElementById('liveDistVal').textContent = fmtDist(show);
                        document.getElementById('liveDistUnit').textContent = fmtFt(show);
                        liveDist.style.display = 'block';
                    }
                }
            }
        }

        // Plane detection
        if (frame.detectedPlanes && _frameCount % 30 === 0) {
            var ct = frame.detectedPlanes.size || 0;
            if (ct !== _xr.planesDetected) {
                _xr.planesDetected = ct;
                var w=0, f=0, c=0;
                frame.detectedPlanes.forEach(function(pl) {
                    if (pl.orientation === 'vertical') w++;
                    else {
                        var pp = frame.getPose ? frame.getPose(pl.planeSpace, refSpace) : null;
                        if (pp && pose.views && pose.views[0]) {
                            if (pp.transform.position.y > pose.views[0].transform.position.y - 0.3) c++; else f++;
                        } else f++;
                    }
                });
                _xr.planeTypes = {walls:w, floors:f, ceilings:c};
                surfaceCountEl.textContent = ct + ' surfaces';

                if (ct === 1) say('Surface found. Keep looking around.', 'surf', 'normal');
                else if (ct >= 4 && _xr.planesDetected < 4) say(ct + ' surfaces. ' + w + ' walls detected. Ready to measure.', 'surf', 'normal');
            }
        }

        // Proactive nudge
        if (!_nudged && (Date.now() - _sessionStart) > 20000 && measurements.length === 0) {
            _nudged = true;
            say('Point at a wall and tap your controller or pinch to place the first point.', 'nudge', 'normal');
        }
    }
    session.requestAnimationFrame(onFrame);
}

// ═══ PLACE MEASUREMENT POINT ═══
function placePoint(pos, hitUsed) {
    if (!_xr.pending3D) {
        // First point
        _xr.pending3D = { x: pos.x, y: pos.y, z: pos.z };
        liveDist.style.display = 'block';
        document.getElementById('liveDistVal').textContent = "0' 0\"";
        document.getElementById('liveDistUnit').textContent = 'measuring...';
        arStatus.textContent = 'Point 1 set → tap the other end';
        say('First point. Walk to the other end and tap.', 'point');
    } else {
        // Second point — complete measurement
        var dx = pos.x - _xr.pending3D.x, dy = pos.y - _xr.pending3D.y, dz = pos.z - _xr.pending3D.z;
        var distM = Math.sqrt(dx*dx + dy*dy + dz*dz);
        var distIn = distM * 39.3701;
        var floorIn = Math.sqrt(dx*dx + dz*dz) * 39.3701;
        var useFloor = Math.abs(dy) < 0.3;
        var finalIn = useFloor ? floorIn : distIn;
        var conf = calcConf(hitUsed, distM, dy);

        measureId++;
        var label = 'Wall ' + measureId;
        measurements.push({
            id: measureId, label: label, distance: finalIn,
            confidence: conf, ts: Date.now(),
            p1: _xr.pending3D, p2: { x: pos.x, y: pos.y, z: pos.z },
            dist3d: distIn, distFloor: floorIn
        });

        _xr.pending3D = null;
        liveDist.style.display = 'none';
        updateCount();
        autoSave();

        arStatus.textContent = label + ': ' + fmtDist(finalIn) + ' → tap for next';

        // Voice feedback based on confidence
        var ft = (finalIn / 12).toFixed(1);
        if (conf < 50) {
            say(label + '. ' + ft + ' feet. Low confidence. Try again closer to the wall.', 'meas', 'critical');
        } else if (conf < 75) {
            say(label + '. ' + ft + ' feet. ' + conf + ' percent.', 'meas', 'high');
        } else {
            say(ft + ' feet. Good.', 'meas', 'normal');
        }
    }
}

// ═══ AR TOOLS ═══
window.setARTool = function(t) { arTool = t; };

window.arUndo = function() {
    if (_xr.pending3D) {
        _xr.pending3D = null;
        liveDist.style.display = 'none';
        arStatus.textContent = 'Point removed. Tap to start again.';
        say('Undone.', 'undo');
        return;
    }
    if (measurements.length === 0) return;
    measurements.pop();
    updateCount(); autoSave();
    arStatus.textContent = 'Last measurement removed';
    say('Removed.', 'undo');
};

// ═══ RESULTS PANEL ═══
window.openResults = function() {
    resultsPanel.classList.add('open');
    renderResults();
};
window.closeResults = function() {
    resultsPanel.classList.remove('open');
};

function renderResults() {
    var list = document.getElementById('resultsList');
    var sum = document.getElementById('resultsSummary');

    if (measurements.length === 0) {
        list.innerHTML = '<p style="color:#7f8c8d;text-align:center;padding:40px">No measurements yet. Go back and start tapping walls!</p>';
        sum.innerHTML = '';
        return;
    }

    // Summary
    var totalLf = 0;
    measurements.forEach(function(m) { totalLf += m.distance / 12; });
    var sorted = measurements.map(function(m) { return m.distance/12; }).sort(function(a,b){return b-a;});
    var estArea = sorted.length >= 2 ? sorted[0] * sorted[1] : 0;
    var avgConf = 0;
    measurements.forEach(function(m) { avgConf += (m.confidence || 100); });
    avgConf = Math.round(avgConf / measurements.length);

    var sh = '';
    sh += '<div class="sum-row"><span class="sl">Walls measured</span><span class="sv">' + measurements.length + '</span></div>';
    sh += '<div class="sum-row"><span class="sl">Total perimeter</span><span class="sv">' + totalLf.toFixed(1) + ' ft</span></div>';
    if (estArea > 0) sh += '<div class="sum-row"><span class="sl">Est. floor area</span><span class="sv">' + estArea.toFixed(0) + ' sq ft</span></div>';
    sh += '<div class="sum-row"><span class="sl">Avg confidence</span><span class="sv">' + avgConf + '%</span></div>';
    sum.innerHTML = sh;

    // List
    var html = '';
    measurements.forEach(function(m) {
        var cc = m.confidence >= 80 ? 'rc-conf-high' : m.confidence >= 50 ? 'rc-conf-med' : 'rc-conf-low';
        html += '<div class="result-card">';
        html += '<div class="rc-label">WALL</div>';
        html += '<div class="rc-value">' + fmtDist(m.distance) + '</div>';
        html += '<div class="rc-detail">' + m.label + ' — ' + fmtFt(m.distance) + '</div>';
        html += '<span class="rc-conf ' + cc + '">' + m.confidence + '% confidence</span>';
        html += '</div>';
    });
    list.innerHTML = html;
}

// ═══ EXPORTS ═══
function getMeasText() {
    var lines = ['Room Scanner — Field Measurements', ''];
    measurements.forEach(function(m) {
        lines.push(m.label + ': ' + fmtDist(m.distance) + ' (' + fmtFt(m.distance) + ') [' + m.confidence + '%]');
    });
    var totalLf = 0;
    measurements.forEach(function(m) { totalLf += m.distance / 12; });
    lines.push('');
    lines.push('Total: ' + measurements.length + ' walls, ' + totalLf.toFixed(1) + ' ft perimeter');
    return lines.join('\n');
}

window.copyAll = function() {
    var t = getMeasText();
    if (navigator.clipboard) navigator.clipboard.writeText(t).then(function() { say('Copied to clipboard.','copy'); });
};

window.exportFieldReport = function() {
    var lines = [];
    lines.push('WATTS SAFETY INSTALLS — FIELD REPORT');
    lines.push('Date: ' + new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString());
    lines.push('Scanner: Room Scanner v4');
    lines.push('');
    var totalLf = 0;
    measurements.forEach(function(m) {
        totalLf += m.distance / 12;
        lines.push(m.label + ': ' + fmtDist(m.distance) + ' (' + fmtFt(m.distance) + ')' + (m.confidence < 80 ? ' [' + m.confidence + '%]' : ''));
    });
    lines.push('');
    lines.push('Total: ' + measurements.length + ' walls, ' + totalLf.toFixed(1) + ' ft perimeter');
    var report = lines.join('\n');
    if (navigator.clipboard) navigator.clipboard.writeText(report).then(function() { say('Field report copied.','copy'); });
};

window.sendToBidGen = function() {
    var t = getMeasText();
    if (window.opener) {
        window.opener.postMessage({ type: 'roomScannerData', measurements: t, photo: snapshotBase64 }, '*');
        say('Sent to BidGen.','send');
    } else {
        try { sessionStorage.setItem('roomScannerData', JSON.stringify({ measurements: t, photo: snapshotBase64 })); } catch(e){}
        try { localStorage.setItem('roomScannerData', JSON.stringify({ measurements: t, photo: snapshotBase64 })); } catch(e){}
        window.location.href = 'index.html#fieldcalc';
    }
};

window.sendToAI = function() {
    if (measurements.length === 0) { say('No measurements to analyze.','ai'); return; }
    var t = getMeasText();
    var prompt = [
        'You are a master general contractor. Here are room measurements from an AR scanner:',
        '', t, '',
        'Provide: 1) Site Assessment 2) Material Takeoff 3) Labor Estimate 4) Scope of Work 5) Recommendations',
        'Be specific. Use the actual measurements. Bold all numbers.'
    ].join('\n');
    say('Sending to AI for analysis...', 'ai');
    fetch('https://watts-ai-proxy.wattssafetyinstalls.workers.dev?model=gemini-2.5-pro', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 16384, temperature: 0.3 } })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var aiText = '';
        try { aiText = data.candidates[0].content.parts[0].text; } catch(e) { aiText = 'Error parsing.'; }
        var el = document.getElementById('resultsList');
        el.innerHTML += '<div class="result-card" style="border-color:#3498db"><div class="rc-label" style="color:#3498db">AI ANALYSIS</div><div style="font-size:13px;line-height:1.6;color:#bdc3c7;margin-top:8px;white-space:pre-wrap">' + aiText.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#ecf0f1">$1</strong>').replace(/\n/g,'<br>') + '</div></div>';
        say('AI analysis complete. Scroll down to see results.', 'ai');
    })
    .catch(function(err) { say('AI error: ' + err.message, 'ai', 'critical'); });
};
